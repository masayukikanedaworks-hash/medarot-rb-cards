<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>MEDAROT RB // CARDBASE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-0:#06080c;--bg-1:#0d1219;--bg-2:#141b27;--bg-3:#1d2638;--border-1:#2a3447;--border-2:#3a4660;--border-3:#525f7c;--text-1:#e8ecf2;--text-2:#aab4c6;--text-3:#6b7689;--orange:#ff6b1a;--orange-bright:#ff8a44;--orange-soft:rgba(255,107,26,.13);--orange-glow:rgba(255,107,26,.45);--cyan:#22d3ee;--cyan-soft:rgba(34,211,238,.1);--cyan-glow:rgba(34,211,238,.35);--act:#38bdf8;--act-soft:rgba(56,189,248,.16);--act-border:rgba(56,189,248,.55);--psv:#34d399;--psv-soft:rgba(52,211,153,.16);--psv-border:rgba(52,211,153,.55);--t-melee:#ef4444;--t-shoot:#f59e0b;--t-assist:#10b981;--t-install:#a855f7;--t-heal:#ec4899;--t-defend:#3b82f6;--sh-2:0 8px 24px rgba(0,0,0,.5);--sh-3:0 16px 48px rgba(0,0,0,.7);--f-display:'Chakra Petch','Zen Kaku Gothic New',sans-serif;--f-body:'Zen Kaku Gothic New',sans-serif;--f-mono:'JetBrains Mono',monospace;--clip-sm:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);--clip-md:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);--clip-lg:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--f-body);background:var(--bg-0);color:var(--text-1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 80% 60% at top left,rgba(255,107,26,.07),transparent 60%),radial-gradient(ellipse 60% 60% at bottom right,rgba(34,211,238,.05),transparent 60%),linear-gradient(rgba(255,255,255,.014) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px);background-size:auto,auto,28px 28px,28px 28px;background-attachment:fixed;min-height:100vh;overflow-x:hidden}
button{font-family:inherit}
.header{position:sticky;top:0;z-index:50;background:rgba(7,10,16,.85);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--border-1)}
.header::after{content:"";display:block;height:1px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.4}
.header-inner{max-width:1400px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
@media(min-width:720px){.header-inner{padding:14px 24px;gap:16px}}
.brand{display:flex;align-items:baseline;gap:10px;flex-shrink:0}
.brand-mark{font-family:var(--f-display);font-weight:700;font-size:17px;letter-spacing:.08em;color:var(--orange);text-shadow:0 0 18px var(--orange-glow);display:flex;align-items:center;gap:8px}
.brand-mark::before{content:"";display:inline-block;width:10px;height:10px;background:var(--orange);box-shadow:0 0 10px var(--orange);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}
@media(min-width:720px){.brand-mark{font-size:20px}}
.brand-sub{font-family:var(--f-mono);font-size:9px;letter-spacing:.3em;color:var(--text-3);text-transform:uppercase;display:none}
@media(min-width:540px){.brand-sub{display:inline}}
.header-tools{margin-left:auto;display:flex;align-items:center;gap:8px}
.cloud-indicator{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;color:var(--cyan);position:relative}
.cloud-indicator svg{width:18px;height:18px}
.cloud-indicator::after{content:"";position:absolute;bottom:6px;right:4px;width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 6px var(--cyan);animation:pulse 2s ease-in-out infinite;border:1px solid var(--bg-0)}
.cloud-indicator.offline{color:var(--text-3)}
.cloud-indicator.offline::after{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:none}
.icon-btn{background:var(--bg-1);border:1px solid var(--border-1);color:var(--text-2);width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s;clip-path:var(--clip-sm)}
.icon-btn:hover{color:var(--orange);border-color:var(--orange);background:var(--bg-2)}
.icon-btn:active{transform:scale(.95)}
.icon-btn svg{width:16px;height:16px}
.stat-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-mono);font-size:11px;color:var(--text-2);border:1px solid var(--border-1);padding:6px 12px;background:var(--bg-1);clip-path:var(--clip-sm)}
.stat-pill b{color:var(--cyan);font-weight:600}
.stat-pill::before{content:"";width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 6px var(--cyan);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.app{max-width:1400px;margin:0 auto;padding:18px 14px 120px}

.section-label{font-family:var(--f-display);font-size:10px;letter-spacing:.25em;color:var(--text-3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::before{content:"";width:16px;height:1px;background:var(--orange)}
.tabs-wrap{margin-bottom:14px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:2px}
.tab{font-family:var(--f-display);font-weight:600;font-size:10px;letter-spacing:.03em;padding:8px 4px;background:var(--bg-1);border:1px solid var(--border-1);color:var(--text-2);cursor:pointer;transition:all .15s;clip-path:var(--clip-sm);white-space:nowrap;text-align:center;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tab:hover{color:var(--text-1);background:var(--bg-2)}
.tab.active{background:var(--orange-soft);border-color:var(--orange);color:var(--orange);box-shadow:0 0 16px rgba(255,107,26,.18)}
.tab .count{margin-left:4px;font-family:var(--f-mono);font-size:9px;opacity:.75;font-weight:400}
.tab.active .count{opacity:1}
@media(min-width:540px){.tabs{grid-template-columns:repeat(8,1fr);gap:6px}.tab{font-size:11px;padding:9px 6px}}
.search-collapse{margin-bottom:14px;background:var(--bg-1);border:1px solid var(--border-1);clip-path:var(--clip-md);overflow:hidden}
.search-collapse[open]{background:var(--bg-1)}
.search-toggle{list-style:none;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:var(--f-display);font-size:11px;letter-spacing:.12em;color:var(--text-2);text-transform:uppercase;font-weight:600;user-select:none;transition:background .15s}
.search-toggle::-webkit-details-marker{display:none}
.search-toggle:hover{background:var(--bg-2)}
.search-collapse[open] .search-toggle{border-bottom:1px solid var(--border-1);color:var(--orange)}
.search-toggle-icon{font-size:13px;line-height:1}
.search-toggle-label{flex:0 1 auto}
.search-toggle-state{margin-left:auto;font-family:var(--f-mono);font-size:10px;color:var(--cyan);background:var(--cyan-soft);border:1px solid var(--cyan);padding:2px 8px;letter-spacing:.04em;display:none}
.search-toggle-state.active{display:inline}
.search-toggle-arrow{font-size:10px;color:var(--text-3);transition:transform .2s ease;margin-left:6px}
.search-collapse[open] .search-toggle-arrow{transform:rotate(180deg)}
.filters{background:transparent;border:none;padding:10px 12px 6px;margin-bottom:0;display:grid;grid-template-columns:1fr;gap:8px;clip-path:none;position:relative}
.filters::before{display:none}
@media(min-width:880px){.filters{grid-template-columns:1fr auto;align-items:center;padding:12px 14px 6px}}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap::before{content:"▸";position:absolute;left:12px;color:var(--orange);font-family:var(--f-mono);font-size:11px;pointer-events:none}
.search-wrap::after{content:"/";position:absolute;right:12px;color:var(--text-3);font-family:var(--f-mono);font-size:10px;border:1px solid var(--border-1);padding:1px 6px;pointer-events:none;background:var(--bg-2)}
.search{width:100%;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:10px 38px 10px 28px;font-family:var(--f-mono);font-size:13px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--cyan)}
.search::placeholder{color:var(--text-3);letter-spacing:.05em}
.filter-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.type-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-family:var(--f-display);font-size:11px;letter-spacing:.04em;padding:6px 11px;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-2);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;font-weight:600}
.chip::before{content:"";width:7px;height:7px;display:inline-block;background:var(--chip-color,var(--text-3));box-shadow:0 0 7px var(--chip-color,transparent)}
.chip:hover{color:var(--text-1);border-color:var(--border-2)}
.chip.active{color:var(--text-1);background:var(--bg-3);border-color:var(--chip-color,var(--orange))}
.adv-filters{background:transparent;border:none;padding:6px 12px 12px;margin-bottom:0;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;clip-path:none}
.range-group{display:flex;flex-direction:column;gap:4px}
.range-group-label{font-family:var(--f-display);font-size:9px;letter-spacing:.16em;color:var(--text-3);text-transform:uppercase;font-weight:600}
.range-inputs{display:flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:11px;color:var(--text-3)}
.range-inputs input{width:54px;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:6px 7px;font-family:var(--f-mono);font-size:12px;outline:none;text-align:center;transition:border-color .15s}
.range-inputs input:focus{border-color:var(--cyan)}
.range-inputs input[type=text]{width:110px;text-align:left}
.sort-select{background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:8px 11px;font-family:var(--f-mono);font-size:12px;outline:none;cursor:pointer;transition:border-color .15s}
.sort-select:focus{border-color:var(--cyan)}
.clear-btn{background:transparent;border:1px solid var(--border-1);color:var(--text-3);font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;padding:7px 12px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.clear-btn:hover{color:var(--orange);border-color:var(--orange)}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
@media(min-width:540px){.grid{grid-template-columns:repeat(6,1fr);gap:8px}}
@media(min-width:880px){.grid{grid-template-columns:repeat(8,1fr);gap:10px}}
.card{position:relative;background:var(--bg-1);border:1px solid var(--border-1);cursor:pointer;overflow:hidden;transition:transform .2s cubic-bezier(.2,.8,.2,1),border-color .18s,box-shadow .18s;clip-path:var(--clip-md);animation:cardIn .35s cubic-bezier(.2,.8,.2,1) backwards}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-3px);border-color:var(--orange);box-shadow:0 14px 38px rgba(255,107,26,.2)}
.card:active{transform:translateY(-1px)}
.card-image{width:100%;aspect-ratio:5/7;background:#fff;position:relative;overflow:hidden}
.card-image img{width:100%;height:100%;object-fit:contain;display:block;transition:transform .4s;transform:scale(1.03)}
.card:hover .card-image img{transform:scale(1.06)}
.card-image-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-3);font-family:var(--f-mono);font-size:10px;letter-spacing:.2em;gap:6px;cursor:pointer;transition:background .15s,color .15s;background:#f4f6fa}
.card-image-empty::before{content:"⬆";font-size:28px;opacity:.55;color:var(--orange)}
.card-image-empty:hover{background:#fff4ec;color:var(--orange)}
.card-image-empty:hover::before{opacity:1}
.card-image-empty span{font-size:9px;letter-spacing:.16em;color:#7a8398}
.card-tag{position:absolute;top:3px;left:3px;font-family:var(--f-display);font-size:7px;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.82);padding:2px 4px;border-left:2px solid var(--tag-color,var(--orange));font-weight:600;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.card-cost-badge{position:absolute;top:3px;right:3px;font-family:var(--f-mono);font-weight:700;font-size:10px;color:var(--orange);background:rgba(0,0,0,.85);padding:2px 5px;border:1px solid var(--orange);min-width:20px;text-align:center;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.card-vbadges{position:absolute;bottom:3px;right:3px;display:flex;gap:3px;z-index:2}
.card-vbadge{font-family:var(--f-mono);font-weight:700;font-size:10px;line-height:1;color:var(--orange);background:rgba(0,0,0,.85);padding:3px 5px;border:1px solid var(--orange);border-radius:2px;box-shadow:0 2px 6px rgba(0,0,0,.45)}
.card-info{padding:5px 6px 6px;border-top:1px solid var(--border-1);background:var(--bg-1)}
.card-name{font-family:var(--f-body);font-weight:700;font-size:10px;color:var(--text-1);line-height:1.25;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em}
.card-meta{display:flex;gap:4px;flex-wrap:wrap;font-family:var(--f-mono);font-size:8px;color:var(--text-3)}
.card-meta span{display:inline-flex;align-items:center;gap:2px}
.card-meta b{color:var(--cyan);font-weight:600}
@media(min-width:540px){.card-tag{font-size:9px;padding:3px 7px}.card-cost-badge{font-size:12px;padding:3px 7px}.card-vbadge{font-size:12px;padding:4px 6px}.card-info{padding:8px 10px 10px}.card-name{font-size:12px;margin-bottom:5px}.card-meta{font-size:10px;gap:6px}}
.empty{padding:80px 24px;text-align:center;border:1px dashed var(--border-1);background:rgba(13,18,25,.4);clip-path:var(--clip-md)}
.empty-icon{font-family:var(--f-mono);font-size:32px;color:var(--text-3);letter-spacing:.25em;margin-bottom:14px;opacity:.6}
.empty-title{font-family:var(--f-display);font-size:16px;color:var(--text-2);margin-bottom:8px;letter-spacing:.08em;font-weight:600}
.empty-sub{font-size:13px;color:var(--text-3);max-width:320px;margin:0 auto;line-height:1.6}
.empty-sub b{color:var(--orange)}
.fab{position:fixed;bottom:22px;right:22px;z-index:60;width:58px;height:58px;background:var(--orange);color:#fff;border:none;font-family:var(--f-display);font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 10px 28px var(--orange-glow),0 0 0 1px var(--orange);transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .2s;clip-path:var(--clip-md);display:flex;align-items:center;justify-content:center;line-height:1}
.fab:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 14px 36px var(--orange-glow),0 0 0 1px var(--orange)}
.fab:active{transform:scale(.95)}
@media(min-width:720px){.fab{width:60px;height:60px;bottom:28px;right:28px}}
.modal-overlay{position:fixed;inset:0;background:rgba(2,4,8,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:12px 8px}
.modal-overlay.open{display:flex}
.modal-overlay.open .modal{animation:modalIn .25s cubic-bezier(.2,.8,.2,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal{background:var(--bg-1);border:1px solid var(--border-2);width:100%;max-width:720px;position:relative;box-shadow:var(--sh-3);clip-path:var(--clip-lg);margin:auto;max-height:calc(100vh - 24px);display:flex;flex-direction:column}
/* CARD DETAIL: fixed (max) size — does not resize with content */
#detailModal .modal{height:calc(100vh - 24px);max-height:calc(100vh - 24px)}
#detailModal .modal-body{flex:1 1 auto}
.modal-head{padding:10px 14px;border-bottom:1px solid var(--border-1);display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(90deg,var(--bg-2),var(--bg-1));flex-shrink:0}
.queue-badge{font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;color:var(--cyan);background:var(--cyan-soft);border:1px solid var(--cyan);padding:4px 10px;margin-left:auto;margin-right:4px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:6px;clip-path:var(--clip-sm)}
.queue-badge::before{content:"";width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 6px var(--cyan);animation:pulse 1.4s ease-in-out infinite}
.modal-title{font-family:var(--f-display);font-size:12px;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:6px}
.modal-title::before{content:"▰";font-size:9px;opacity:.8}
.modal-close{background:transparent;border:1px solid var(--border-1);color:var(--text-2);width:28px;height:28px;font-size:12px;cursor:pointer;font-family:var(--f-mono);transition:all .15s;flex-shrink:0}
.modal-close:hover{color:var(--orange);border-color:var(--orange)}
.modal-body{padding:12px;display:grid;gap:10px;overflow-y:auto;flex:1 1 auto;min-height:0}
@media(min-width:540px){.modal-head{padding:14px 18px}.modal-title{font-size:14px;letter-spacing:.14em}.modal-title::before{font-size:10px}.modal-close{width:32px;height:32px;font-size:14px}.modal-body{padding:18px;gap:16px}}
.dropzone{border:1px dashed var(--border-2);background:var(--bg-0);padding:26px 16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;display:block}
.dropzone:hover,.dropzone.dragover{border-color:var(--orange);background:var(--orange-soft)}
.dropzone-icon{font-family:var(--f-mono);font-size:22px;color:var(--orange);margin-bottom:8px;opacity:.8}
.dropzone-text{font-family:var(--f-mono);font-size:12px;color:var(--text-2);letter-spacing:.06em}
.dropzone-hint{font-family:var(--f-mono);font-size:10px;color:var(--text-3);margin-top:6px}
.dropzone input{display:none}
.dropzone-mini{padding:7px 12px;margin-top:8px;display:flex;align-items:center;justify-content:center}
.dropzone-mini .dropzone-text{font-family:var(--f-display);font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--orange)}
.preview-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.preview-block{border:1px solid var(--border-1);background:var(--bg-0);padding:8px}
.preview-label{font-family:var(--f-mono);font-size:9px;letter-spacing:.16em;color:var(--text-3);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.preview-label small{color:var(--cyan);font-size:9px;font-weight:600}
.preview-img{width:100%;aspect-ratio:5/7;object-fit:contain;background:var(--bg-0);display:block}
.preview-img:not([src]),.preview-img[src=""],.preview-img[src="#"]{visibility:hidden}
.crop-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 12px;background:var(--bg-0);border:1px solid var(--border-1)}
.rotate-btn{background:var(--bg-1);border:1px solid var(--border-2);color:var(--text-2);width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;clip-path:var(--clip-sm);padding:0}
.rotate-btn:hover{color:var(--orange);border-color:var(--orange);background:var(--bg-2)}
.rotate-btn:active{transform:scale(.9) rotate(-90deg)}
.rotate-btn:disabled{opacity:.4;cursor:not-allowed}
.rotate-btn svg{width:14px;height:14px}
.crop-status{font-family:var(--f-mono);font-size:11px;flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.crop-status.success{color:#34d399}
.crop-status.fail{color:#f59e0b}
.crop-status.original{color:var(--text-3)}
.crop-status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;flex-shrink:0}
.toggle{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-mono);font-size:11px;color:var(--text-2);cursor:pointer;user-select:none}
.toggle input{display:none}
.toggle-track{width:30px;height:16px;background:var(--bg-3);border-radius:8px;position:relative;transition:background .15s;border:1px solid var(--border-2)}

.dcard:active{transform:translateY(0)}
.dcard-img{width:100%;aspect-ratio:5/7;background:#fff;object-fit:contain;display:block}
.dcard-img-empty{width:100%;aspect-ratio:5/7;background:#f4f6fa;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:8px;color:#7a8398;letter-spacing:.1em;text-align:center;padding:4px}
.dcard-name{font-family:var(--f-body);font-weight:700;font-size:9px;color:var(--text-1);line-height:1.2;padding:3px 4px 4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em;border-top:1px solid var(--border-1)}
.dcard-qty{position:absolute;top:2px;right:2px;font-family:var(--f-mono);font-weight:700;font-size:11px;color:#fff;background:var(--orange);border:1px solid var(--orange-bright);padding:1px 6px;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.5);min-width:22px;text-align:center}
.dcard-arm{position:absolute;top:2px;left:2px;font-family:var(--f-display);font-weight:700;font-size:8px;color:#fff;background:rgba(0,0,0,.8);padding:2px 5px;z-index:2;border-left:2px solid var(--cyan)}
.dcard-rm{position:absolute;bottom:2px;right:2px;width:20px;height:20px;border:1px solid #b91c1c;background:rgba(0,0,0,.7);color:#f87171;font-family:var(--f-mono);font-size:11px;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;border-radius:2px;line-height:1}
.dcard-rm:hover{background:#b91c1c;color:#fff}
.deck-empty{padding:32px 16px;text-align:center;font-family:var(--f-mono);font-size:12px;color:var(--text-3);letter-spacing:.08em;border:1px dashed var(--border-1);clip-path:var(--clip-sm)}
/* detail-modal deck-add section (only injected when opened from deck builder) */
.detail-deckadd{background:var(--bg-0);border:1px solid var(--orange);clip-path:var(--clip-sm);padding:12px;margin-top:12px}
.detail-deckadd-title{font-family:var(--f-display);font-size:10px;letter-spacing:.14em;color:var(--orange);text-transform:uppercase;font-weight:700;margin-bottom:10px}
.detail-deckadd .qty-stepper{margin-bottom:14px}
.detail-deckadd-row{display:flex;gap:8px;align-items:center}
.detail-deckadd-row .btn{flex:1}
.qty-modal{position:fixed;inset:0;background:rgba(2,4,8,.85);backdrop-filter:blur(5px);z-index:320;display:none;align-items:center;justify-content:center;padding:16px}
.qty-modal.open{display:flex}
.qty-box{background:var(--bg-1);border:1px solid var(--border-2);clip-path:var(--clip-md);box-shadow:var(--sh-3);width:100%;max-width:320px;padding:18px}
.qty-box-title{font-family:var(--f-display);font-size:13px;font-weight:700;color:var(--orange);letter-spacing:.06em;margin-bottom:4px}
.qty-box-sub{font-family:var(--f-mono);font-size:11px;color:var(--text-3);margin-bottom:16px}
.qty-stepper{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px}
.qty-step-btn{width:44px;height:44px;background:var(--bg-2);border:1px solid var(--border-2);color:var(--text-1);font-family:var(--f-display);font-size:22px;font-weight:700;cursor:pointer;transition:all .15s;clip-path:var(--clip-sm)}
.qty-step-btn:hover:not(:disabled){background:var(--bg-3);border-color:var(--orange);color:var(--orange)}
.qty-step-btn:disabled{opacity:.35;cursor:not-allowed}
.qty-val{font-family:var(--f-display);font-size:30px;font-weight:700;color:var(--text-1);min-width:54px;text-align:center}
.qty-actions{display:flex;gap:8px}
.qty-actions .btn{flex:1}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">MEDAROT RB</div>
      <div class="brand-sub">CARD DATABASE</div>
    </div>
    <div class="header-tools">
      <div class="cloud-indicator" id="cloudIndicator" title="Supabase 接続中">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
      </div>
      <button class="icon-btn" id="importBtn" title="JSONインポート" aria-label="インポート">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" id="exportBtn" title="JSONエクスポート" aria-label="エクスポート">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <button class="icon-btn" id="deckBuilderBtn" title="デッキ構築" aria-label="デッキ構築">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="13" height="17" rx="1"/><path d="M8 4V2"/><path d="M19 6v13a2 2 0 0 1-2 2"/><path d="M21 8v11"/></svg>
      </button>
      <div class="stat-pill">TOTAL <b id="totalCount">0</b></div>
    </div>
  </div>
</header>

<main class="app">
  <div class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </div>

  <details class="search-collapse" id="searchCollapse">
    <summary class="search-toggle">
      <span class="search-toggle-icon">🔍</span>
      <span class="search-toggle-label">検索 / フィルタ</span>
      <span class="search-toggle-state" id="searchFilterCount"></span>
      <span class="search-toggle-arrow">▾</span>
    </summary>

    <div class="filters">
      <div class="search-wrap">
        <input id="search" class="search" type="text" placeholder="CARD NAME / EFFECT TEXT" autocomplete="off" spellcheck="false">
      </div>
      <div class="filter-controls">
        <div class="type-chips" id="typeChips"></div>
      </div>
    </div>

    <div class="adv-filters">
      <div class="range-group">
        <div class="range-group-label">行動コスト</div>
        <div class="range-inputs">
          <input type="number" id="costMin" placeholder="min" min="0">
          <span>–</span>
          <input type="number" id="costMax" placeholder="max" min="0">
        </div>
      </div>
      <div class="range-group">
        <div class="range-group-label">BP</div>
        <div class="range-inputs">
          <input type="number" id="bpMin" placeholder="min" min="0">
          <span>–</span>
          <input type="number" id="bpMax" placeholder="max" min="0">
        </div>
      </div>
      <div class="range-group" id="legGroup" style="display:none;">
        <div class="range-group-label">脚部タイプ</div>
        <div class="range-inputs">
          <input type="text" id="legFilter" placeholder="二脚 / 多脚 / 飛行...">
        </div>
      </div>
      <div class="range-group" id="partsArmGroup" style="display:none;">
        <div class="range-group-label">パーツ腕</div>
        <select id="partsArmFilter" class="sort-select">
          <option value="">指定なし</option>
          <option value="L">L腕</option>
          <option value="R">R腕</option>
        </select>
      </div>
      <div class="range-group" id="partsModeGroup" style="display:none;">
        <div class="range-group-label">パーツモード</div>
        <select id="partsModeFilter" class="sort-select">
          <option value="">指定なし</option>
          <option value="行動">行動</option>
          <option value="戦術">戦術</option>
        </select>
      </div>
      <div class="range-group">
        <div class="range-group-label">並び替え</div>
        <select id="sortSelect" class="sort-select">
          <option value="updated-desc">追加日(新しい順)</option>
          <option value="updated-asc">追加日(古い順)</option>
          <option value="name-asc">名前(A→Z)</option>
          <option value="name-desc">名前(Z→A)</option>
          <option value="cost-asc">コスト(低→高)</option>
          <option value="cost-desc">コスト(高→低)</option>
          <option value="bp-asc">BP(低→高)</option>
          <option value="bp-desc">BP(高→低)</option>
        </select>
      </div>
      <div class="spacer"></div>
      <button class="clear-btn" id="clearFilters">CLEAR ALL</button>
    </div>
  </details>

  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <div class="empty-icon">◇ ◇ ◇</div>
    <div class="empty-title">NO CARDS FOUND</div>
    <div class="empty-sub">右下の <b>＋</b> から最初のカードを追加するか、検索条件を変更してください</div>
  </div>
</main>

<button class="fab" id="fabAdd" title="新規カード追加" aria-label="新規カード">＋</button>

<div class="deck-overlay" id="deckOverlay" role="dialog" aria-modal="true">
  <div class="deck-head">
    <div class="deck-head-title"><span class="dht-full">デッキ構築</span><span class="dht-short">デッキ</span></div>
    <select class="deck-select" id="deckSelect" title="デッキ選択"></select>
    <input class="deck-name-input" id="deckNameInput" type="text" placeholder="デッキ名" maxlength="40" autocomplete="off">
    <button class="btn btn-ghost" id="deckNewBtn">新規</button>
    <button class="btn btn-ghost" id="deckDeleteBtn">削除</button>
    <button class="btn btn-primary" id="deckSaveBtn">保存</button>
    <button class="modal-close" id="deckCloseBtn" aria-label="閉じる">✕</button>
  </div>
  <div class="deck-body">
    <div class="deck-fixed">
      <div class="deck-cats" id="deckCats"></div>
      <div class="deck-subtabs" id="deckSubtabs" style="display:none;"></div>
      <input class="deck-pool-search" id="deckPoolSearch" type="text" placeholder="名前 / 効果で絞り込み" autocomplete="off">
    </div>
    <div class="deck-split">
      <div class="deck-pane-label">カードリスト — タップで追加 <span id="deckPoolHint"></span></div>
      <div class="deck-pool">
        <div class="deck-grid" id="deckPoolGrid"></div>
      </div>
      <div class="deck-pane-label">デッキ <b id="deckPaneCount">0</b> <span id="deckPaneSub"></span></div>
      <div class="deck-list-pane">
        <div id="deckListWrap"></div>
      </div>
    </div>
  </div>
</div>


<div class="modal-overlay" id="uploadModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="uploadTitle">NEW CARD</div>
      <div class="queue-badge" id="queueBadge" style="display:none;"></div>
      <button class="modal-close" id="uploadClose" aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body">
      <div class="preview-row" id="previewRow">
        <div class="preview-block">
          <div class="preview-label">ORIGINAL <small id="origSize"></small></div>
          <img id="origPreview" class="preview-img" alt="">
        </div>
        <div class="preview-block">
          <div class="preview-label">CROPPED <small id="trimSize"></small></div>
          <img id="trimPreview" class="preview-img" alt="">
        </div>
      </div>

      <label class="dropzone dropzone-mini" id="dropzone">
        <input type="file" id="fileInput" accept="image/*">
        <div class="dropzone-text">↑画像挿入</div>
      </label>

      <div id="cropControlsWrap" class="crop-controls" style="display:none;">
        <div class="crop-status" id="cropStatus">
          <span class="crop-status-dot"></span>
          <span id="cropStatusText">処理中...</span>
        </div>
        <button type="button" class="rotate-btn" id="rotateBtn" title="90°回転(時計回り)" aria-label="回転">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <label class="toggle">
          <input type="checkbox" id="useOriginalToggle">
          <span class="toggle-track"></span>
          <span>クロップなし</span>
        </label>
      </div>

      <div id="statusMsg" class="status-msg info" style="display:none;"></div>

      <div class="field-grid">
        <div class="field field-full">
          <label>カード種別</label>
          <select id="f_cardType">
            <option value="leader_medarot">リーダーメダロット</option>
            <option value="parts_card">パーツ</option>
            <option value="support_medarot">サポートメダロット</option>
            <option value="tactical_card">戦術カード</option>
            <option value="medarotter">メダロッター</option>
            <option value="medal">メダル</option>
            <option value="medaforce_card">メダフォース</option>
            <option value="keyword">キーワード</option>
          </select>
        </div>
        <div class="field" id="wrap_name">
          <label>カード名</label>
          <input type="text" id="f_name" placeholder="メダロット名 / カード名">
        </div>
        <div class="field" id="wrap_partsArm" style="display:none;">
          <label>パーツ種別</label>
          <select id="f_partsArm">
            <option value="">—</option>
            <option value="L">L腕(左腕)</option>
            <option value="R">R腕(右腕)</option>
          </select>
        </div>
        <div class="field" id="wrap_medarotName" style="display:none;">
          <label>メダロット名(型番で紐付)</label>
          <input type="text" id="f_medarotName" placeholder="紐付くメダロット名" autocomplete="off">
        </div>
        <div class="field" id="wrap_modelNo" style="display:none;">
          <label>型番</label>
          <input type="text" id="f_modelNo" placeholder="例: XXX00-Y" autocomplete="off">
        </div>
        <div class="field field-full" id="wrap_elementType">
          <label>タイプ（2つ目は複数タイプ用・任意）</label>
          <div style="display:flex;gap:8px">
            <select id="f_elementType1" style="flex:1;min-width:0;" title="タイプ①（代表）">
              <option value="">—</option>
              <option value="格闘">格闘</option>
              <option value="射撃">射撃</option>
              <option value="支援">支援</option>
              <option value="設置">設置</option>
              <option value="回復">回復</option>
              <option value="防御">防御</option>
            </select>
            <select id="f_elementType2" style="flex:1;min-width:0;" title="タイプ②（任意）">
              <option value="">— (なし)</option>
              <option value="格闘">格闘</option>
              <option value="射撃">射撃</option>
              <option value="支援">支援</option>
              <option value="設置">設置</option>
              <option value="回復">回復</option>
              <option value="防御">防御</option>
            </select>
          </div>
        </div>
        <div class="field" id="wrap_actionCost">
          <label>行動コスト / 放熱コスト</label>
          <input type="number" id="f_actionCost" min="0">
        </div>
        <div class="field" id="wrap_bonusValue" style="display:none;">
          <label>ボーナス値</label>
          <input type="number" id="f_bonusValue" min="0" placeholder="例: 1000">
        </div>
        <div class="field" id="wrap_barrierLimit" style="display:none;">
          <label>バリアリミット</label>
          <input type="number" id="f_barrierLimit" min="0" placeholder="例: 2">
        </div>
        <div class="field" id="wrap_bp">
          <label>BP</label>
          <input type="number" id="f_bp" min="0">
        </div>
        <div class="field" id="wrap_coolingCost">
          <label>冷却コスト</label>
          <input type="number" id="f_coolingCost" min="0">
        </div>
        <div class="field field-full" id="wrap_legType" style="display:none;">
          <label>脚部タイプ</label>
          <select id="f_legType">
            <option value="">—</option>
            <option value="二脚">二脚</option>
            <option value="多脚">多脚</option>
            <option value="車両">車両</option>
            <option value="飛行">飛行</option>
            <option value="潜水">潜水</option>
            <option value="戦車">戦車</option>
            <option value="浮遊">浮遊</option>
          </select>
        </div>
        <div class="field field-full" id="wrap_tactical" style="display:none;">
          <label>戦術（最大3つ・タイプと同じ選択肢）</label>
          <div style="display:flex;gap:8px">
            <select id="f_tactical1" style="flex:1;min-width:0;" title="戦術①">
              <option value="">—</option>
              <option value="格闘">格闘</option>
              <option value="射撃">射撃</option>
              <option value="支援">支援</option>
              <option value="設置">設置</option>
              <option value="回復">回復</option>
              <option value="防御">防御</option>
            </select>
            <select id="f_tactical2" style="flex:1;min-width:0;" title="戦術②">
              <option value="">—</option>
              <option value="格闘">格闘</option>
              <option value="射撃">射撃</option>
              <option value="支援">支援</option>
              <option value="設置">設置</option>
              <option value="回復">回復</option>
              <option value="防御">防御</option>
            </select>
            <select id="f_tactical3" style="flex:1;min-width:0;" title="戦術③">
              <option value="">—</option>
              <option value="格闘">格闘</option>
              <option value="射撃">射撃</option>
              <option value="支援">支援</option>
              <option value="設置">設置</option>
              <option value="回復">回復</option>
              <option value="防御">防御</option>
            </select>
          </div>
        </div>
        <div class="field field-full" id="wrap_traits">
          <label>特性・行動</label>
          <textarea id="f_traits" placeholder="メダロットの特性や行動テキスト"></textarea>
        </div>

        <details class="fold" id="wrap_mc_collapse" style="display:none;">
          <summary>メダチェンジ後</summary>
          <div class="fold-body">
            <div class="field field-full">
              <label>タイプ（2つ目は任意）</label>
              <div style="display:flex;gap:8px">
                <select id="f_mc_type1" style="flex:1;min-width:0;">
                  <option value="">—</option>
                  <option value="格闘">格闘</option>
                  <option value="射撃">射撃</option>
                  <option value="支援">支援</option>
                  <option value="設置">設置</option>
                  <option value="回復">回復</option>
                  <option value="防御">防御</option>
                </select>
                <select id="f_mc_type2" style="flex:1;min-width:0;">
                  <option value="">— (なし)</option>
                  <option value="格闘">格闘</option>
                  <option value="射撃">射撃</option>
                  <option value="支援">支援</option>
                  <option value="設置">設置</option>
                  <option value="回復">回復</option>
                  <option value="防御">防御</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>行動コスト</label>
              <input type="number" id="f_mc_actionCost" min="0">
            </div>
            <div class="field">
              <label>バリアリミット</label>
              <input type="number" id="f_mc_barrierLimit" min="0">
            </div>
            <div class="field">
              <label>BP</label>
              <input type="number" id="f_mc_bp" min="0">
            </div>
            <div class="field">
              <label>冷却コスト</label>
              <input type="number" id="f_mc_coolingCost" min="0">
            </div>
            <div class="field field-full" id="wrap_mc_legType" style="display:none;">
              <label>脚部タイプ</label>
              <select id="f_mc_legType">
                <option value="">—</option>
                <option value="二脚">二脚</option>
                <option value="多脚">多脚</option>
                <option value="車両">車両</option>
                <option value="飛行">飛行</option>
                <option value="潜水">潜水</option>
                <option value="戦車">戦車</option>
                <option value="浮遊">浮遊</option>
              </select>
            </div>
            <div class="field field-full">
              <label>戦術（最大3つ）</label>
              <div style="display:flex;gap:8px">
                <select id="f_mc_tactical1" style="flex:1;min-width:0;">
                  <option value="">—</option>
                  <option value="格闘">格闘</option>
                  <option value="射撃">射撃</option>
                  <option value="支援">支援</option>
                  <option value="設置">設置</option>
                  <option value="回復">回復</option>
                  <option value="防御">防御</option>
                </select>
                <select id="f_mc_tactical2" style="flex:1;min-width:0;">
                  <option value="">—</option>
                  <option value="格闘">格闘</option>
                  <option value="射撃">射撃</option>
                  <option value="支援">支援</option>
                  <option value="設置">設置</option>
                  <option value="回復">回復</option>
                  <option value="防御">防御</option>
                </select>
                <select id="f_mc_tactical3" style="flex:1;min-width:0;">
                  <option value="">—</option>
                  <option value="格闘">格闘</option>
                  <option value="射撃">射撃</option>
                  <option value="支援">支援</option>
                  <option value="設置">設置</option>
                  <option value="回復">回復</option>
                  <option value="防御">防御</option>
                </select>
              </div>
            </div>
            <div class="field field-full">
              <label id="lbl_mc_traitsA">ドライブA — 特性・行動</label>
              <textarea id="f_mc_traitsA" placeholder="メダチェンジ後の特性・行動テキスト"></textarea>
            </div>
            <div class="field field-full" id="wrap_mc_traitsB">
              <label>ドライブB — 特性・行動</label>
              <textarea id="f_mc_traitsB" placeholder="ドライブB の特性・行動テキスト"></textarea>

<script>
'use strict';

const CARD_CATEGORIES = {
  leader_medarot:  { label: 'リーダーメダロット',  short: 'LEADER' },
  parts_card:      { label: 'パーツ',            short: 'PARTS' },
  support_medarot: { label: 'サポートメダロット',  short: 'SUPPORT-M' },
  tactical_card:   { label: '戦術カード',        short: 'TACTICAL' },
  medarotter:      { label: 'メダロッター',       short: 'MEDAROTTER' },
  medal:           { label: 'メダル',            short: 'MEDAL' },
  medaforce_card:  { label: 'メダフォース',       short: 'MEDAFORCE' },
  keyword:         { label: 'キーワード',         short: 'KEYWORD' },
};
const CATEGORY_KEYS = Object.keys(CARD_CATEGORIES);
const ELEMENT_TYPES = ['格闘','射撃','支援','設置','回復','防御'];
const ELEMENT_COLORS = {
  '格闘':'var(--t-melee)','射撃':'var(--t-shoot)','支援':'var(--t-assist)',
  '設置':'var(--t-install)','回復':'var(--t-heal)','防御':'var(--t-defend)',
};
const SCHEMA_VERSION = 3;
// Normalize an elementType value to an array of valid type names.
// Accepts a single string ("防御"), a comma-separated string ("防御,格闘"),
// or an array. Invalid/empty entries are dropped. Existing single-type
// cards keep working unchanged (returns a 1-element array).
function elemList(v) {
  if (v == null) return [];
  const arr = Array.isArray(v) ? v : String(v).split(/[,、]/);
  const seen = {};
  const out = [];
  for (let s of arr) {
    s = String(s).trim();
    if (s && ELEMENT_TYPES.indexOf(s) >= 0 && !seen[s]) { seen[s] = 1; out.push(s); }
  }
  return out;
}
// Canonical storage form: comma-separated string (or null when empty).
function elemToStore(v) {
  const l = elemList(v);
  return l.length ? l.join(',') : null;
}
// Primary type (first) — used where a single representative is needed.
function elemPrimary(v) { const l = elemList(v); return l.length ? l[0] : null; }

// === notes ⇄ 型番 / メダロット名 (structured, stored in the existing
// `notes` column — no DB/JSON schema change) ===
// Existing data uses `notes: "型番: XXX00-Y"`; parser is backward
// compatible and preserves any unrecognized remainder verbatim.
function parseMeta(notes) {
  const out = { modelNo: '', medarotName: '', rest: '' };
  if (notes == null || notes === '') return out;
  const restLines = [];
  String(notes).split('\n').forEach(function(raw) {
    const line = raw.replace(/\s+$/, '');
    let m = /^\s*型番\s*[:：]\s*(.*)$/.exec(line);
    if (m) { if (!out.modelNo) out.modelNo = m[1].trim(); return; }
    m = /^\s*メダロット名\s*[:：]\s*(.*)$/.exec(line);
    if (m) { if (!out.medarotName) out.medarotName = m[1].trim(); return; }
    if (line.trim() !== '') restLines.push(line);
  });
  out.rest = restLines.join('\n');
  return out;
}
function buildMeta(modelNo, medarotName, rest) {
  const parts = [];
  if (modelNo && String(modelNo).trim() !== '') parts.push('型番: ' + String(modelNo).trim());
  if (medarotName && String(medarotName).trim() !== '') parts.push('メダロット名: ' + String(medarotName).trim());
  if (rest && String(rest).trim() !== '') parts.push(String(rest).trim());
  return parts.length ? parts.join('\n') : null;
}

// === 戦術 ⇄ traits line (stored as a `戦術:[X][Y][Z]` line inside the
// existing `traits` string — no schema change; renderTraits already
// renders this line as tactical chips). ===
function splitTactical(traits) {
  const res = { tactical: [], body: '' };
  if (traits == null || traits === '') return res;
  const bodyLines = [];
  let took = false;
  String(traits).split('\n').forEach(function(raw) {
    const line = raw.trim();
    const tm = /^戦術\s*[:：]\s*(.+)$/.exec(line);
    if (tm && !took) {
      took = true;
      tm[1].split(/[,、\s]+|\]\s*\[|[\[\]]/).map(function(s){ return s.trim(); })
        .filter(Boolean).forEach(function(t){
          if (ELEMENT_TYPES.indexOf(t) >= 0 && res.tactical.length < 3) res.tactical.push(t);
        });
      return;
    }
    bodyLines.push(raw);
  });
  res.body = bodyLines.join('\n').replace(/^\n+|\n+$/g, '');
  return res;
}
function joinTactical(tacticalArr, body) {
  const tac = (tacticalArr || []).map(function(s){ return String(s).trim(); })
    .filter(function(t){ return ELEMENT_TYPES.indexOf(t) >= 0; }).slice(0, 3);
  const b = (body == null ? '' : String(body)).replace(/^\n+|\n+$/g, '');
  let out = '';
  if (tac.length) out += '戦術:' + tac.map(function(t){ return '[' + t + ']'; }).join('');
  if (b) out += (out ? '\n' : '') + b;
  return out.trim() ? out : null;
}

// Find a リーダー/サポートメダロット whose 型番 matches (case/space-insensitive).
function findMedarotByModelNo(modelNo, excludeId) {
  if (!modelNo) return null;
  const norm = function(s){ return String(s == null ? '' : s).replace(/\s+/g, '').toLowerCase(); };
  const target = norm(modelNo);
  if (!target) return null;
  return state.cards.find(function(c) {
    if (!c || (c.cardType !== 'leader_medarot' && c.cardType !== 'support_medarot')) return false;
    if (excludeId && c.id === excludeId) return false;
    return norm(parseMeta(c.notes).modelNo) === target;
  }) || null;
}

// Active variant tiers for a given card type / parts arm.
//   parts + R腕 → α / β     parts + L腕 → ドライブA / ドライブB
//   leader / support       → メダチェンジ後 (drive_a)
function activeVariantTiers(cardType, partsArm) {
  if (cardType === 'parts_card') {
    return partsArm === 'R' ? ['drive_a', 'drive_b']
         : partsArm === 'L' ? ['alpha', 'beta'] : [];
  }
  if (cardType === 'leader_medarot') return ['drive_a', 'drive_b'];
  if (cardType === 'support_medarot') return ['drive_a'];
  return [];
}

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2d2xidHF6Z2t1ZndlcHVzcGZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjI1MTYsImV4cCI6MjA5NDQzODUxNn0.pW_PfH26TOevWxx5U32q0uX5r1vjxuw1lzF5j-VTsx4';

// === DB ↔ App 変換 (snake_case ↔ camelCase) ===
function dbToCard(row) {
  return {
    id: row.id,
    cardType: row.card_type,
    name: row.name,
    elementType: row.element_type,
    actionCost: row.action_cost,

    barrierLimit: row.barrier_limit,

    traits: row.traits,
    effectText: row.effect_text,

    image: row.image_path ? publicImageUrl(row.image_path) : null,

    createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now(),
    updatedAt: row.updated_at ? new Date(row.updated_at).getTime() : Date.now(),
  };
}
function cardToDb(card) {
  return {
    id: card.id,
    card_type: card.cardType,
    name: card.name,
    element_type: card.elementType || null,
    action_cost: card.actionCost == null ? null : card.actionCost,
    bp: card.bp == null ? null : card.bp,
    cooling_cost: card.coolingCost == null ? null : card.coolingCost,
    leg_type: card.legType || null,
    parts_arm: card.partsArm || null,
    parts_mode: card.partsMode || null,
    bonus_value: card.bonusValue == null ? null : card.bonusValue,
    barrier_limit: card.barrierLimit == null ? null : card.barrierLimit,
    variants: (Array.isArray(card.variants) && card.variants.length) ? card.variants : null,
    traits: card.traits || null,
    effect_text: card.effectText || null,
    notes: card.notes || null,
    image_path: card.imagePath || null,
  };
}
function publicImageUrl(path) {
  if (!path) return null;
  if (path.startsWith('http')) return path;
  return SUPABASE_URL + '/storage/v1/object/public/' + STORAGE_BUCKET + '/' + path;
}

// === 画像アップロード/削除 (REST API) ===
async function uploadCardImage(cardId, dataUrl) {
  if (!SUPABASE_ENABLED || !dataUrl) return null;
  const m = /^data:(image\/[\w+]+);base64,(.+)$/.exec(dataUrl);
  if (!m) throw new Error('画像形式が認識できません');
  const mime = m[1];
  const ext = mime.split('/')[1].replace('jpeg', 'jpg').replace('+xml', '');
  const bytes = Uint8Array.from(atob(m[2]), c => c.charCodeAt(0));
  const blob = new Blob([bytes], { type: mime });
  const path = 'cards/' + cardId + '-' + Date.now() + '.' + ext;
  const url = SUPABASE_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + path;
  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': mime,
      'x-upsert': 'false',
      'Cache-Control': '3600',
    },
    body: blob,
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    throw new Error('画像アップロード失敗(' + resp.status + '): ' + txt.slice(0, 200));
  }
  return path;
}
async function deleteCardImage(path) {
  if (!SUPABASE_ENABLED || !path) return;
  const url = SUPABASE_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + path;
  try {
    await fetch(url, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      },
    });
  } catch (e) {}
}

// === DB操作 (REST API) ===
async function loadAllCards() {
  if (!SUPABASE_ENABLED) return [];
  const url = SUPABASE_URL + '/rest/v1/cards?select=*&order=updated_at.desc';
  const resp = await fetch(url, { headers: supaHeaders() });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    throw new Error('読み込み失敗(' + resp.status + '): ' + txt.slice(0, 200));
  }
  const data = await resp.json();
  return (data || []).map(dbToCard);
}

async function persistCard(card) {
  if (!SUPABASE_ENABLED) throw new Error('Supabase未接続');
  const row = cardToDb(card);
  const url = SUPABASE_URL + '/rest/v1/cards?on_conflict=id';
  const resp = await fetch(url, {
    method: 'POST',
    headers: supaHeaders({
      'Prefer': 'resolution=merge-duplicates,return=minimal',
    }),
    body: JSON.stringify(row),
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    throw new Error('保存失敗(' + resp.status + '): ' + txt.slice(0, 200));
  }
}

async function deleteCardFromStorage(id) {
  if (!SUPABASE_ENABLED) return;
  const card = state.cards.find(c => c.id === id);
  if (card && card.imagePath) await deleteCardImage(card.imagePath);
  const url = SUPABASE_URL + '/rest/v1/cards?id=eq.' + encodeURIComponent(id);
  const resp = await fetch(url, {
    method: 'DELETE',
    headers: supaHeaders(),
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    throw new Error('削除失敗(' + resp.status + '): ' + txt.slice(0, 200));
  }
}

function toast(msg, kind = 'info', duration = 3200) {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast toast-' + kind;
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, duration);
}

  }

}
async function persistDeck(d) {

  const url = SUPABASE_URL + '/rest/v1/decks?on_conflict=id';
  const resp = await fetch(url, {
    method: 'POST',
    headers: supaHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(deckToDb(d)),
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    throw new Error('デッキ保存失敗(' + resp.status + '): ' + txt.slice(0, 200));
  }
}
async function deleteDeckFromStorage(id) {
  if (!SUPABASE_ENABLED) return;
  const url = SUPABASE_URL + '/rest/v1/decks?id=eq.' + encodeURIComponent(id);
  const resp = await fetch(url, { method: 'DELETE', headers: supaHeaders() });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');

  }
}
// Sort: cardType → 右上タイプ(elemPrimary) → あいうえお順
const __deckCollator = new Intl.Collator('ja');
const __ELEM_ORDER = { '格闘': 0, '射撃': 1, '支援': 2, '設置': 3, '回復': 4, '防御': 5 };
function deckSortCards(arr) {
  return arr.slice().sort((a, b) => {
    if (a.cardType !== b.cardType)
      return (CATEGORY_KEYS.indexOf(a.cardType)) - (CATEGORY_KEYS.indexOf(b.cardType));
    const ea = elemPrimary(a.elementType), eb = elemPrimary(b.elementType);
    const oa = ea != null && __ELEM_ORDER[ea] != null ? __ELEM_ORDER[ea] : 9;
    const ob = eb != null && __ELEM_ORDER[eb] != null ? __ELEM_ORDER[eb] : 9;
    if (oa !== ob) return oa - ob;
    return __deckCollator.compare(a.name || '', b.name || '');
  });
}
function deckPoolFor(cat) {
  const byType = (t) => state.cards.filter(c => c.cardType === t);
  if (cat === 'leader') return byType('leader_medarot');
  if (cat === 'medal') return byType('medal');
  if (cat === 'medaforce') return byType('medaforce_card');
  if (cat === 'parts_r') return state.cards.filter(c => c.cardType === 'parts_card' && c.partsArm === 'R');
  if (cat === 'parts_l') return state.cards.filter(c => c.cardType === 'parts_card' && c.partsArm === 'L');
  if (cat === 'main') return state.cards.filter(c =>

}

function applyMainQty(cardId, qty) {
  const d = deckState.draft;
  const cur = d.mainDeck.find(e => e.cardId === cardId);
  const curQty = cur ? cur.qty : 0;
  const total = d.mainDeck.reduce((s, e) => s + e.qty, 0) - curQty;
  if (qty > 3) { toast('同じカードは3枚までです', 'error'); return false; }
  if (total + qty > 35) { toast('メインデッキは合計35枚までです', 'error'); return false; }
  if (qty <= 0) d.mainDeck = d.mainDeck.filter(e => e.cardId !== cardId);

  if (cat === 'leader') d.leaderId = null;
  else if (cat === 'medal') d.medalId = null;
  else if (cat === 'parts_r') { const i = d.partsR.indexOf(cardId); if (i >= 0) d.partsR.splice(i, 1); }
  else if (cat === 'parts_l') { const i = d.partsL.indexOf(cardId); if (i >= 0) d.partsL.splice(i, 1); }
  else if (cat === 'medaforce') { const i = d.medaforce.indexOf(cardId); if (i >= 0) d.medaforce.splice(i, 1); }

/* Whiten the FULL image background BEFORE any cropping.
   Samples the background color from the image edges, then flood-fills
   from all four edges turning every background-reachable pixel white.
   Conservative (safe-side) color threshold so the main card's own dark
   regions are never mistaken for background; faded siblings / dark
   gradients touching the card may remain, which is acceptable. Returns
   a new dataURL plus the detected bg color. */
async function whitenFullImage(originalDataUrl) {
  const img = await loadImage(originalDataUrl);
  const W = img.naturalWidth, H = img.naturalHeight;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0, W, H);
  const imgData = ctx.getImageData(0, 0, W, H);
  const data = imgData.data;

  // Background color = median of many edge samples (1px inset).
  const samples = [];
  const inset = 1;
  const step = Math.max(1, Math.floor(Math.min(W, H) / 60));
  function rgbAt(x, y) {
    const i = (y * W + x) * 4;
    return [data[i], data[i + 1], data[i + 2]];
  }
  for (let x = 0; x < W; x += step) {
    samples.push(rgbAt(x, inset));
    samples.push(rgbAt(x, H - 1 - inset));
  }
  for (let y = 0; y < H; y += step) {
    samples.push(rgbAt(inset, y));
    samples.push(rgbAt(W - 1 - inset, y));
  }
  const med = (arr) => { const s = arr.slice().sort((a, b) => a - b); return s[Math.floor(s.length / 2)]; };
  const bgR = med(samples.map(c => c[0]));
  const bgG = med(samples.map(c => c[1]));
  const bgB = med(samples.map(c => c[2]));

  // Conservative threshold: only clearly background-like pixels qualify,
  // so the card's dark art is safe (safe-side per requirement).
  const THRESH = 55;
  const thresh2 = THRESH * THRESH;
  const total = W * H;
  const mask = new Uint8Array(total); // 0 unknown, 1 background, 2 blocker
  const queue = new Int32Array(total);
  let qHead = 0, qTail = 0;
  function isBgLike(pos) {
    const idx = pos * 4;
    const dr = data[idx] - bgR, dg = data[idx + 1] - bgG, db = data[idx + 2] - bgB;
    return (dr * dr + dg * dg + db * db) < thresh2;
  }
  function enqueue(x, y) {
    if (x < 0 || y < 0 || x >= W || y >= H) return;
    const pos = y * W + x;
    if (mask[pos] !== 0) return;
    if (isBgLike(pos)) { mask[pos] = 1; queue[qTail++] = pos; }
    else { mask[pos] = 2; }
  }
  for (let x = 0; x < W; x++) { enqueue(x, 0); enqueue(x, H - 1); }
  for (let y = 0; y < H; y++) { enqueue(0, y); enqueue(W - 1, y); }
  while (qHead < qTail) {
    const p = queue[qHead++];
    const x = p % W, y = (p / W) | 0;
    if (x > 0)     enqueue(x - 1, y);
    if (x < W - 1) enqueue(x + 1, y);
    if (y > 0)     enqueue(x, y - 1);
    if (y < H - 1) enqueue(x, y + 1);
  }
  for (let p = 0; p < total; p++) {
    if (mask[p] === 1) {
      const i = p * 4;
      data[i] = 255; data[i + 1] = 255; data[i + 2] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return {
    dataUrl: canvas.toDataURL('image/jpeg', 0.95),
    bgR: bgR, bgG: bgG, bgB: bgB,
  };
}

/* AUTO CARD DETECTION (connected non-white region)
   0. Whiten the full-image background FIRST (whitenFullImage)
   1. On the whitened image, the card is the single connected region of
      non-white pixels that contains the image center. Its bounding box
      is the whole card (frame, cost octagon, name bar, type icons, art,
      effect box and BP row) — robust even when the lower half of the
      card (effect box) is light, which broke the old row/col-run method
      and caused half-card / clipped crops.
   2. Scale back to original dimensions, validate. */
async function detectCardBounds(originalDataUrl) {
  // Step 0: whiten the entire background first, then detect & crop on it.
  const white = await whitenFullImage(originalDataUrl);
  const img = await loadImage(white.dataUrl);
  const w = img.naturalWidth, h = img.naturalHeight;

  // Downsample for analysis speed
  const ANALYSIS_MAX = 360;
  const scale = Math.min(1, ANALYSIS_MAX / Math.max(w, h));
  const aw = Math.max(4, Math.round(w * scale));
  const ah = Math.max(4, Math.round(h * scale));
  const canvas = document.createElement('canvas');
  canvas.width = aw; canvas.height = ah;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0, aw, ah);
  const data = ctx.getImageData(0, 0, aw, ah).data;

  // Non-white test (background was already whitened, so "card" = anything
  // clearly darker/more saturated than pure white).
  const WHITE_SUM = 255 * 3 - 24;
  const total = aw * ah;
  const nw = new Uint8Array(total);
  for (let p = 0; p < total; p++) {
    const i = p * 4;
    nw[p] = (data[i] + data[i + 1] + data[i + 2]) < WHITE_SUM ? 1 : 0;
  }

  // Seed = image center; if that pixel is white, spiral out to the
  // nearest non-white pixel.
  let cx = aw >> 1, cy = ah >> 1;
  if (!nw[cy * aw + cx]) {
    let found = false;
    for (let rad = 1; rad < Math.max(aw, ah) && !found; rad++) {
      const y0 = Math.max(0, cy - rad), y1 = Math.min(ah - 1, cy + rad);
      const x0 = Math.max(0, cx - rad), x1 = Math.min(aw - 1, cx + rad);
      for (let y = y0; y <= y1 && !found; y++) {
        for (let x = x0; x <= x1 && !found; x++) {
          if (nw[y * aw + x]) { cx = x; cy = y; found = true; }
        }
      }
    }
    if (!found) {
      return { detected: false, almostFull: false, x: 0, y: 0, w, h, ratio: 1,
               whitenedDataUrl: white.dataUrl };
    }
  }

  // Flood-fill (8-connected) the card region from the center seed.
  const seen = new Uint8Array(total);
  const queue = new Int32Array(total);
  let qHead = 0, qTail = 0;
  const seed = cy * aw + cx;
  seen[seed] = 1; queue[qTail++] = seed;
  let minX = cx, maxX = cx, minY = cy, maxY = cy;
  while (qHead < qTail) {
    const pos = queue[qHead++];
    const x = pos % aw, y = (pos / aw) | 0;
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
    const nb = [
      [x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1],
      [x - 1, y - 1], [x + 1, y - 1], [x - 1, y + 1], [x + 1, y + 1],
    ];
    for (let k = 0; k < 8; k++) {
      const nx = nb[k][0], ny = nb[k][1];
      if (nx < 0 || ny < 0 || nx >= aw || ny >= ah) continue;
      const np = ny * aw + nx;
      if (!seen[np] && nw[np]) { seen[np] = 1; queue[qTail++] = np; }
    }
  }

  const sx = Math.max(0, Math.round(minX / scale));
  const sy = Math.max(0, Math.round(minY / scale));
  const sw = Math.min(w - sx, Math.round((maxX - minX + 1) / scale));
  const sh = Math.min(h - sy, Math.round((maxY - minY + 1) / scale));

  // Validation: region must be a plausible card (not a tiny speck nor
  // essentially the whole frame).
  if (sw < w * 0.15 || sh < h * 0.15) {
    return { detected: false, almostFull: false, x: 0, y: 0, w, h, ratio: 1,
             whitenedDataUrl: white.dataUrl };
  }
  const areaRatio = (sw * sh) / (w * h);

  return {
    detected: areaRatio < 0.985,
    almostFull: areaRatio >= 0.985,
    x: sx, y: sy, w: sw, h: sh,
    ratio: areaRatio,
    bgR: white.bgR, bgG: white.bgG, bgB: white.bgB,
    whitenedDataUrl: white.dataUrl,
  };
}

async function cropAndResize(originalDataUrl, bounds, useOriginal, maxSide = 1200) {
  // Source = the already background-whitened full image (produced in
  // detectCardBounds step 0). Falls back to the original if unavailable
  // (e.g. detection failed / useOriginal). White-bg-first → then crop.
  const srcUrl = (bounds && bounds.whitenedDataUrl) ? bounds.whitenedDataUrl : originalDataUrl;
  const img = await loadImage(srcUrl);
  const W = img.naturalWidth, H = img.naturalHeight;
  let sx = 0, sy = 0, sw = W, sh = H;
  if (!useOriginal && bounds && bounds.detected) {
    sx = bounds.x; sy = bounds.y; sw = bounds.w; sh = bounds.h;
  }
  const ratio = Math.min(1, maxSide / Math.max(sw, sh));
  const dw = Math.max(1, Math.round(sw * ratio));
  const dh = Math.max(1, Math.round(sh * ratio));
  const canvas = document.createElement('canvas');
  canvas.width = dw; canvas.height = dh;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);

  // Background is already white (whitened before cropping). A light
  // second pass cleans up any residual bg color along the new crop
  // edges; it is a no-op on already-white pixels.
  if (bounds && typeof bounds.bgR === 'number') {
    whitenBackground(ctx, dw, dh, bounds.bgR, bounds.bgG, bounds.bgB);
  }

  // Equal-margin framing: place the cropped card centered on a white
  // canvas so the padding is identical on all four sides. The margin is
  // a fixed fraction of the card's longer side, so every card ends up
  // with a visually consistent, balanced border regardless of its own
  // aspect ratio.
  if (!useOriginal && bounds && bounds.detected) {
    const MARGIN_FRAC = 0.06; // 6% of the longer side, applied uniformly
    const pad = Math.round(Math.max(dw, dh) * MARGIN_FRAC);
    const fw = dw + pad * 2;
    const fh = dh + pad * 2;
    const framed = document.createElement('canvas');
    framed.width = fw; framed.height = fh;
    const fctx = framed.getContext('2d');
    fctx.fillStyle = '#ffffff';
    fctx.fillRect(0, 0, fw, fh);
    fctx.imageSmoothingEnabled = true;
    fctx.imageSmoothingQuality = 'high';
    // Centered → equal left/right and top/bottom margins by construction.
    fctx.drawImage(canvas, pad, pad);
    return {
      dataUrl: framed.toDataURL('image/jpeg', 0.9),
      origDims: { w: W, h: H },
      outDims: { w: fw, h: fh },
    };
  }

  return {
    dataUrl: canvas.toDataURL('image/jpeg', 0.9),
    origDims: { w: W, h: H },
    outDims: { w: dw, h: dh },
  };
}

function whitenBackground(ctx, w, h, bgR, bgG, bgB) {
  // Flood-fill based: any pixel reachable from the image edges via
  // "background-like" pixels becomes white. This guarantees that
  // pixels enclosed by the card body (e.g. blue card icons) are
  // preserved, even if their color is similar to the background.
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const total = w * h;
  // Mark mask: 0 = unknown, 1 = background (will whiten),
  //            2 = visited but not background (queued blocker, skip)
  const mask = new Uint8Array(total);

  // Pixel is "background-like" if RGB distance from detected bg < THRESH.
  // Use a generous threshold so faded UI / siblings (which sit on the
  // same dark bg) are captured.
  const THRESH = 70;
  const thresh2 = THRESH * THRESH;
  function isBgLike(idx) {
    const dr = data[idx] - bgR;
    const dg = data[idx + 1] - bgG;
    const db = data[idx + 2] - bgB;
    return (dr * dr + dg * dg + db * db) < thresh2;
  }

  // BFS queue (typed array index queue)
  const queue = new Int32Array(total);
  let qHead = 0, qTail = 0;
  function enqueue(x, y) {
    if (x < 0 || y < 0 || x >= w || y >= h) return;
    const pos = y * w + x;
    if (mask[pos] !== 0) return;
    if (isBgLike(pos * 4)) {
      mask[pos] = 1;
      queue[qTail++] = pos;
    } else {
      mask[pos] = 2; // blocker — leave the pixel as-is
    }
  }
  // Seed from all 4 edges
  for (let x = 0; x < w; x++) { enqueue(x, 0); enqueue(x, h - 1); }
  for (let y = 0; y < h; y++) { enqueue(0, y); enqueue(w - 1, y); }
  // BFS
  while (qHead < qTail) {
    const p = queue[qHead++];
    const x = p % w, y = (p / w) | 0;
    if (x > 0)     enqueue(x - 1, y);
    if (x < w - 1) enqueue(x + 1, y);
    if (y > 0)     enqueue(x, y - 1);
    if (y < h - 1) enqueue(x, y + 1);
  }
  // Whiten all reachable background pixels
  for (let p = 0; p < total; p++) {
    if (mask[p] === 1) {
      const i = p * 4;
      data[i] = 255; data[i + 1] = 255; data[i + 2] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}


function applyFilters() {
  const q = state.search.trim().toLowerCase();
  return state.cards.filter(c => {
    if (state.activeTab !== 'all' && c.cardType !== state.activeTab) return false;
    if (state.elementType && elemList(c.elementType).indexOf(state.elementType) < 0) return false;
    if (state.bpMin !== '' && (c.bp == null || c.bp < +state.bpMin)) return false;
    if (state.bpMax !== '' && (c.bp == null || c.bp > +state.bpMax)) return false;
    if (state.costMin !== '' && (c.actionCost == null || c.actionCost < +state.costMin)) return false;
    if (state.costMax !== '' && (c.actionCost == null || c.actionCost > +state.costMax)) return false;
    if (state.legFilter) {
      const lf = state.legFilter.trim().toLowerCase();
      if (!c.legType || !c.legType.toLowerCase().includes(lf)) return false;
    }
    if (state.partsArmFilter && c.partsArm !== state.partsArmFilter) return false;
    if (state.partsModeFilter && c.partsMode !== state.partsModeFilter) return false;
    if (q) {
      const hay = [c.name, c.traits, c.effectText, c.notes, c.legType].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}
function sortCards(arr) {
  const sorted = arr.slice();
  const cmpN = (a, b) => (a == null ? Infinity : a) - (b == null ? Infinity : b);
  const cmpNDesc = (a, b) => (b == null ? -Infinity : b) - (a == null ? -Infinity : a);
  const collator = new Intl.Collator('ja');
  switch (state.sortBy) {
    case 'name-asc':  sorted.sort((a, b) => collator.compare(a.name || '', b.name || '')); break;
    case 'name-desc': sorted.sort((a, b) => collator.compare(b.name || '', a.name || '')); break;
    case 'bp-asc':    sorted.sort((a, b) => cmpN(a.bp, b.bp)); break;
    case 'bp-desc':   sorted.sort((a, b) => cmpNDesc(a.bp, b.bp)); break;
    case 'cost-asc':  sorted.sort((a, b) => cmpN(a.actionCost, b.actionCost)); break;
    case 'cost-desc': sorted.sort((a, b) => cmpNDesc(a.actionCost, b.actionCost)); break;
    case 'updated-asc':  sorted.sort((a, b) => (a.updatedAt || 0) - (b.updatedAt || 0)); break;
    default: sorted.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)); break;
  }
  return sorted;
}

function renderTabs() {
  const counts = { all: state.cards.length };
  CATEGORY_KEYS.forEach(k => counts[k] = 0);
  state.cards.forEach(c => { if (counts[c.cardType] != null) counts[c.cardType]++; });
  const tabs = [{ key: 'all', label: 'ALL' }, ...CATEGORY_KEYS.map(k => ({ key: k, label: CARD_CATEGORIES[k].short }))];
  const el = document.getElementById('tabs');
  el.innerHTML = tabs.map(t =>
    '<button class="tab ' + (state.activeTab === t.key ? 'active' : '') + '" data-tab="' + t.key + '">' +
    t.label + '<span class="count">' + (counts[t.key] || 0) + '</span></button>'
  ).join('');
  el.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => { state.activeTab = btn.dataset.tab; renderAll(); });
  });
  document.getElementById('legGroup').style.display = state.activeTab === 'leader_medarot' ? 'flex' : 'none';
  const partsActive = state.activeTab === 'parts_card';
  document.getElementById('partsArmGroup').style.display = partsActive ? 'flex' : 'none';
  document.getElementById('partsModeGroup').style.display = partsActive ? 'flex' : 'none';
}
function renderTypeChips() {
  const el = document.getElementById('typeChips');
  el.innerHTML = ELEMENT_TYPES.map(t =>
    '<button class="chip ' + (state.elementType === t ? 'active' : '') + '" ' +
    'style="--chip-color: ' + ELEMENT_COLORS[t] + '" data-type="' + t + '">' + t + '</button>'
  ).join('');
  el.querySelectorAll('[data-type]').forEach(b => {
    b.addEventListener('click', () => {
      state.elementType = (state.elementType === b.dataset.type ? '' : b.dataset.type);
      renderTypeChips(); renderGrid();
