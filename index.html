}
function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = sortCards(applyFilters());
  document.getElementById('totalCount').textContent = state.cards.length;
  updateFilterBadge();
  if (state.loading) {
    grid.innerHTML = Array.from({ length: 8 }).map(() =>
      '<div class="card"><div class="card-image skeleton" style="aspect-ratio:5/7"></div><div class="card-info"><div class="skeleton" style="height:12px;margin-bottom:6px"></div><div class="skeleton" style="height:10px;width:60%"></div></div></div>'
    ).join('');
    document.getElementById('emptyState').style.display = 'none';
    return;
  }
  if (filtered.length === 0) {
    grid.innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  grid.innerHTML = filtered.map((c, i) => cardTileHtml(c, i)).join('');
  grid.querySelectorAll('[data-card-id]').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.cardId));
  });
}
function cardTileHtml(c, i) {
  const cat = CARD_CATEGORIES[c.cardType] || { short: '—' };
  const __ptype = elemPrimary(c.elementType);
  const tagColor = __ptype ? ELEMENT_COLORS[__ptype] : 'var(--orange)';
  const cost = (c.actionCost != null && c.actionCost !== '')
    ? '<div class="card-cost-badge">' + escapeHtml(String(c.actionCost)) + '</div>' : '';
  const img = c.image
    ? '<img src="' + c.image + '" alt="' + escapeAttr(c.name || '') + '" loading="lazy">'
    : '<div class="card-image-empty"><span>画像を追加</span></div>';
  // α/β/ドライブ variant badges (shown at the image's bottom-right)
  const vtiers = Array.isArray(c.variants)
    ? c.variants.filter(v => v && (v.tier === 'alpha' || v.tier === 'beta'
        || v.tier === 'drive_a' || v.tier === 'drive_b'))
        .map(v => v.tier) : [];
  const vbadges = vtiers.length
    ? '<div class="card-vbadges">' +
      (vtiers.indexOf('alpha') >= 0 ? '<span class="card-vbadge">α</span>' : '') +
      (vtiers.indexOf('beta') >= 0 ? '<span class="card-vbadge">β</span>' : '') +
      (vtiers.indexOf('drive_a') >= 0 ? '<span class="card-vbadge">A</span>' : '') +
      (vtiers.indexOf('drive_b') >= 0 ? '<span class="card-vbadge">B</span>' : '') +
      '</div>'
    : '';
  const meta = [
    elemList(c.elementType).map(t =>
      '<span style="color:' + ELEMENT_COLORS[t] + '">' + escapeHtml(t) + '</span>'
    ).join('') || '',
    c.partsArm ? '<span>' + c.partsArm + '腕</span>' : '',
    c.partsMode ? '<span>' + escapeHtml(c.partsMode) + '</span>' : '',
    c.bp != null && c.bp !== '' ? '<span>BP:<b>' + c.bp + '</b></span>' : '',
    c.bonusValue != null && c.bonusValue !== '' ? '<span>+<b>' + c.bonusValue + '</b></span>' : '',
    c.barrierLimit != null && c.barrierLimit !== '' ? '<span>BL:<b>' + c.barrierLimit + '</b></span>' : '',
    c.coolingCost != null && c.coolingCost !== '' ? '<span>冷却:<b>' + c.coolingCost + '</b></span>' : '',
    c.legType ? '<span>' + escapeHtml(c.legType) + '</span>' : '',
  ].filter(Boolean).join('');
  const delay = Math.min(i, 12) * 20;
  return '<div class="card" data-card-id="' + c.id + '" style="animation-delay:' + delay + 'ms">' +
    '<div class="card-image">' + img +
    '<div class="card-tag" style="--tag-color: ' + tagColor + '">' + cat.short + '</div>' +
    cost + vbadges + '</div>' +
    '<div class="card-info"><div class="card-name">' + escapeHtml(c.name || '(無題)') + '</div>' +
    '<div class="card-meta">' + (meta || '<span>—</span>') + '</div></div></div>';
}
function renderAll() { renderTabs(); renderTypeChips(); renderGrid(); }

function updateFilterBadge() {
  let count = 0;
  if (state.search) count++;
  if (state.elementType) count++;
  if (state.bpMin !== '' || state.bpMax !== '') count++;
  if (state.costMin !== '' || state.costMax !== '') count++;
  if (state.legFilter) count++;
  if (state.partsArmFilter) count++;
  if (state.partsModeFilter) count++;
  const el = document.getElementById('searchFilterCount');
  if (!el) return;
  if (count > 0) {
    el.textContent = count + ' ACTIVE';
    el.classList.add('active');
  } else {
    el.textContent = '';
    el.classList.remove('active');
  }
}

/* Parse + render a structured traits text block.
   Recognized lines:
     "戦術: 射撃, 射撃"           → tactical type chips
     "[<cost>] <name>(行動|戦術)"  → action header
     "<text>"                     → action effect body (continuation)
   Falls back to a single text block if no structured tokens found. */
function renderTraits(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let any = false;
  let buffer = null;
  const out = [];
  const flush = () => {
    if (!buffer) return;
    const isPassive = buffer.kind === 'passive';
    const kindLabel = isPassive ? '特性' : '行動';
    const kindClass = isPassive ? 'kind-passive' : 'kind-action';
    const costHtml = (buffer.cost != null && buffer.cost !== '')
      ? '<span class="trait-cost">' + escapeHtml(String(buffer.cost)) + '</span>' : '';
    out.push(
      '<div class="trait-action' + (isPassive ? ' is-passive' : '') + '">' +
        '<div class="trait-action-head">' +
          '<span class="trait-kind ' + kindClass + '">' + kindLabel + '</span>' +
          costHtml +
          '<span class="trait-name">' + escapeHtml(buffer.name) + '</span>' +
          (buffer.mode ? '<span class="trait-mode">' + escapeHtml(buffer.mode) + '</span>' : '') +
        '</div>' +
        (buffer.effect.trim() ? '<div class="trait-effect">' + escapeHtml(buffer.effect.trim()) + '</div>' : '') +
      '</div>'
    );
    buffer = null;
  };
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { continue; }
    // Tactical line: "戦術:[設置][設置]" or "戦術: 射撃, 射撃"
    const tm = /^戦術\s*[:：]\s*(.+)$/.exec(line);
    if (tm) {
      flush();
      any = true;
      const types = tm[1].split(/[,、\s]+|\]\s*\[|[\[\]]/).map(s => s.trim()).filter(Boolean);
      out.push(
        '<div class="trait-tactical">' +
        '<span class="trait-tactical-label">戦術</span>' +
        types.map(t => {
          const c = ELEMENT_COLORS[t] || 'var(--text-3)';
          return '<span class="trait-type-chip" style="--type-c:' + c + '">' + escapeHtml(t) + '</span>';
        }).join('') +
        '</div>'
      );
      continue;
    }
    // New structured form: "【行動】<name>(<cost>)：<effect>" or "【特性】<name>：<effect>"
    const km = /^【\s*(行動|特性)\s*】\s*(.+)$/.exec(line);
    if (km) {
      flush();
      any = true;
      const kind = km[1] === '特性' ? 'passive' : 'action';
      let rest = km[2].trim();
      let cost = null, name = rest, effect = '';
      // Split name vs effect on the first fullwidth/halfwidth colon
      const colonIdx = rest.search(/[:：]/);
      if (colonIdx >= 0) {
        name = rest.slice(0, colonIdx).trim();
        effect = rest.slice(colonIdx + 1).trim();
      }
      // Extract trailing "(N)" cost from the name part (actions only)
      const cm = /^(.*?)\s*[（(]\s*(\d+)\s*[）)]\s*$/.exec(name);
      if (cm) { name = cm[1].trim(); cost = cm[2]; }
      buffer = { kind: kind, cost: cost, name: name, mode: '', effect: effect };
      continue;
    }
    // Legacy action header: "[N] name(行動|戦術)"
    const am = /^\[(\d+)\]\s*(.+?)(?:\s*[（(](行動|戦術)[）)])?\s*$/.exec(line);
    if (am) {
      flush();
      any = true;
      // "(行動)" duplicates the kind badge, so don't surface it as a mode.
      const m = (am[3] && am[3] !== '行動') ? am[3] : '';
      buffer = { kind: 'action', cost: am[1], name: am[2], mode: m, effect: '' };
      continue;
    }
    // Leader-style header without a cost bracket:
    //   "<name>(特性)"  → passive
    //   "<name>(行動)"  → action (no cost)
    //   "<name>(戦術)"  → action with 戦術 mode
    const lm = /^(.+?)\s*[（(](特性|行動|戦術)[）)]\s*$/.exec(line);
    if (lm) {
      flush();
      any = true;
      const isPsv = lm[2] === '特性';
      buffer = {
        kind: isPsv ? 'passive' : 'action',
        cost: null,
        name: lm[1].trim(),
        mode: lm[2] === '戦術' ? '戦術' : '',
        effect: '',
      };
      continue;
    }
    // Continuation / freeform
    if (buffer) {
      buffer.effect += (buffer.effect ? '\n' : '') + line;
    } else {
      out.push('<div class="detail-text-block">' + escapeHtml(line) + '</div>');
    }
  }
  flush();
  if (!any) {
    return '<div class="detail-text-block">' + escapeHtml(text) + '</div>';
  }
  return out.join('');
}

function openDetail(id) {
  const c = state.cards.find(x => x.id === id);
  if (!c) return;
  const cat = CARD_CATEGORIES[c.cardType] || { label: '—' };
  // Build the ordered list of views (base first, then variants) up front so
  // both the stat row and the variant section can use per-variant overrides.
  const tierOrder = { base: 0, alpha: 1, beta: 2, drive_a: 3, drive_b: 4 };
  const greek = { base: '', alpha: 'α', beta: 'β', drive_a: 'A', drive_b: 'B' };
  const vs = Array.isArray(c.variants) ? c.variants : [];
  const views = [];
  if (c.traits) views.push({
    key: 'base', label: '基本', greek: '', traits: c.traits,
    actionCost: c.actionCost, image: c.image || null,
    elementType: c.elementType, partsMode: c.partsMode, barrierLimit: c.barrierLimit,
    bp: c.bp, coolingCost: c.coolingCost, legType: c.legType,
  });
  vs.slice().sort((a, b) => (tierOrder[a.tier] != null ? tierOrder[a.tier] : 9) - (tierOrder[b.tier] != null ? tierOrder[b.tier] : 9))
    .forEach(v => views.push({
      key: v.tier,
      label: (function() {
        const isLeader = c.cardType === 'leader_medarot';
        const isSupport = c.cardType === 'support_medarot';
        if (isLeader && v.tier === 'drive_a') return 'ドライブA';
        if (isLeader && v.tier === 'drive_b') return 'ドライブB';
        if (isSupport && (v.tier === 'drive_a' || v.tier === 'drive_b')) return 'メダチェンジ';
        if (c.cardType === 'parts_card' && v.tier === 'drive_a') return 'ドライブA';
        if (c.cardType === 'parts_card' && v.tier === 'drive_b') return 'ドライブB';
        if (v.tier === 'alpha') return '強化α';
        if (v.tier === 'beta') return '強化β';
        return v.label || v.tier;
      })(),
      greek: '',
      traits: v.traits != null ? v.traits : c.traits,
      actionCost: v.actionCost != null ? v.actionCost : c.actionCost,
      image: v.image || c.image || null,
      // Per-variant overrides; fall back to the base card when absent.
      elementType: (v.elementType != null && v.elementType !== '') ? v.elementType : c.elementType,
      partsMode: (v.partsMode != null && v.partsMode !== '') ? v.partsMode : c.partsMode,
      barrierLimit: (v.barrierLimit != null && v.barrierLimit !== '') ? v.barrierLimit : c.barrierLimit,
      bonusValue: (v.bonusValue != null && v.bonusValue !== '') ? v.bonusValue : c.bonusValue,
      bp: (v.bp != null && v.bp !== '') ? v.bp : c.bp,
      coolingCost: (v.coolingCost != null && v.coolingCost !== '') ? v.coolingCost : c.coolingCost,
      legType: (v.legType != null && v.legType !== '') ? v.legType : c.legType,
    }));

  // Compute the stat row for a given view (overrides win, base is fallback).
  // For parts cards the 腕 column is shown before TYPE (per UI request).
  function statsFor(view) {
    const g = (k) => (view && view[k] != null && view[k] !== '') ? view[k] : c[k];
    const elementType = g('elementType');
    const partsMode = g('partsMode');
    const barrierLimit = g('barrierLimit');
    const actionCost = g('actionCost');
    const bonusValue = g('bonusValue');
    const bp = g('bp');
    const coolingCost = g('coolingCost');
    const legType = g('legType');
    const types = elemList(elementType);
    const tc = types.length ? ELEMENT_COLORS[types[0]] : 'var(--orange)';
    const isParts = c.cardType === 'parts_card';
    const armStat = c.partsArm ? { l: '腕', v: c.partsArm + '腕', color: 'var(--cyan)' } : null;
    // タイプは常に TYPE / TYPE 2 の2セル（タイプを持つカード種別のみ）。無い側は「-」。
    const typeBearing = ['leader_medarot', 'support_medarot', 'parts_card',
      'tactical_card', 'medarotter', 'medaforce_card'].indexOf(c.cardType) >= 0;
    let typeStats = [];
    if (typeBearing) {
      const t1 = types[0] || null, t2 = types[1] || null;
      typeStats = [
        { l: 'TYPE',   v: t1 || '-', color: t1 ? ELEMENT_COLORS[t1] : null },
        { l: 'TYPE 2', v: t2 || '-', color: t2 ? ELEMENT_COLORS[t2] : null },
      ];
    }
    const lead = isParts ? [armStat].concat(typeStats) : typeStats.concat([armStat]);
    const meta = parseMeta(c.notes);
    const stats = lead.concat([
      partsMode ? { l: 'モード', v: partsMode, color: 'var(--cyan)' } : null,
      (actionCost != null && actionCost !== '') ? { l: '行動コスト', v: actionCost, color: 'var(--orange)' } : null,
      (bonusValue != null && bonusValue !== '') ? { l: 'ボーナス', v: '+' + bonusValue, color: 'var(--orange)' } : null,
      (barrierLimit != null && barrierLimit !== '') ? { l: 'バリアリミット', v: barrierLimit, color: 'var(--cyan)' } : null,
      (bp != null && bp !== '') ? { l: 'BP', v: bp } : null,
      (coolingCost != null && coolingCost !== '') ? { l: '冷却コスト', v: coolingCost } : null,
      legType ? { l: '脚部', v: legType } : null,
      (isParts && meta.medarotName) ? { l: 'メダロット名', v: meta.medarotName, color: 'var(--cyan)' } : null,
    ]).filter(Boolean);
    const html = stats.map(s =>
      '<div class="stat"' + (s.color ? ' style="border-left-color:' + s.color + '"' : '') + '>' +
      '<div class="stat-label">' + s.l + '</div>' +
      '<div class="stat-value"' + (s.color ? ' style="color:' + s.color + '"' : '') + '>' +
      (s.html != null ? s.html : escapeHtml(String(s.v))) + '</div></div>'
    ).join('');
    return { tc: tc, html: html };
  }
  const __initialStats = statsFor(views.length ? views[0] : null);
  const typeColor = __initialStats.tc;
  const statsHtml = __initialStats.html;

  // メダチェンジ後画像: リーダー/サポートメダロット かつ drive_a/drive_b 保有時のみ。
  // drive_a/drive_b 両 variant の image を共通1枚として扱う。
  const isMedaChangeLeader =
    (c.cardType === 'leader_medarot' || c.cardType === 'support_medarot') &&
    Array.isArray(c.variants) &&
    c.variants.some(v => v && (v.tier === 'drive_a' || v.tier === 'drive_b'));
  const mcImg = isMedaChangeLeader ? (function() {
    const dv = c.variants.find(v => v && (v.tier === 'drive_a' || v.tier === 'drive_b') &&
      v.image && String(v.image).trim() !== '');
    return dv ? dv.image : null;
  })() : null;
  const medaChangeSection = isMedaChangeLeader ? (
    '<div class="mc-img-section">' +
      '<div class="detail-text-label" style="margin-top:10px;">メダチェンジ後</div>' +
      (mcImg
        ? '<div class="mc-img-wrap" id="mcImgWrap"><img class="detail-img" src="' + mcImg + '" alt="メダチェンジ後">' +
          '<button class="mc-img-clear" id="mcImgClear" title="削除">✕</button></div>'
        : '<label class="mc-img-drop" id="mcImgDrop"><input type="file" id="mcImgFile" accept="image/*" hidden>' +
          '<span>＋ メダチェンジ後の画像を追加</span></label>') +
    '</div>'
  ) : '';

  // 型番: カード名の横（右寄せ・小さめ）。紐付くメダロットがあればリンク。
  const __meta = parseMeta(c.notes);
  let modelNoHeaderHtml = '';
  if (__meta.modelNo) {
    const lt = findMedarotByModelNo(__meta.modelNo, c.id);
    const inner = lt
      ? '<span class="modelno-link" data-target="' + escapeAttr(lt.id) +
        '" style="cursor:pointer;text-decoration:underline;">' + escapeHtml(__meta.modelNo) + '</span>'
      : escapeHtml(__meta.modelNo);
    modelNoHeaderHtml = '<span class="detail-modelno">' + inner + '</span>';
  }

  document.getElementById('detailBody').innerHTML =
    '<div class="detail-grid">' +
    '<div>' +
    '<div class="detail-img-wrap' + (c.image ? '' : ' empty') + '" id="detailImgWrap">' +
      (c.image ? '<img class="detail-img" src="' + c.image + '" alt="' + escapeAttr(c.name || '') + '">'
               : '<div class="detail-img-empty"><span>画像を追加</span></div>') +
    '</div>' +
    medaChangeSection +
    '</div>' +
    '<div>' +
      '<div class="detail-header">' +
        '<div class="detail-category" id="detailCategory" style="color: ' + typeColor + '">' + cat.label + '</div>' +
        '<div class="detail-name-row"><div class="detail-name">' + escapeHtml(c.name || '(無題)') + '</div>' +
        modelNoHeaderHtml + '</div>' +
      '</div>' +
      '<div class="stat-row" id="detailStatRow">' + statsHtml + '</div>' +
      (function() {
        if (views.length === 0) return '';
        let html = '<div class="detail-text-label">特性・行動</div>';
        if (views.length > 1) {
          html += '<div class="variant-tabs" id="variantTabs">' +
            views.map((v, i) =>
              '<button class="variant-tab' + (i === 0 ? ' active' : '') + '" data-vidx="' + i + '">' +
              escapeHtml(v.label) +
              (v.greek ? '<span class="vt-greek">' + v.greek + '</span>' : '') +
              '</button>'
            ).join('') +
            '</div>';
        }
        html += '<div id="variantBody">' + renderTraits(views[0].traits) + '</div>';
        // Stash views on a global for the click handler
        window.__detailVariantViews = views;
        return html;
      })() +
      (c.effectText ? '<div class="detail-text-label">効果</div><div class="detail-text-block">' + escapeHtml(c.effectText) + '</div>' : '') +
      '' +
      '<div class="row-actions" style="margin-top:14px;">' +
        '<button class="btn btn-ghost" id="editFromDetail">編集</button>' +
      '</div>' +
    '</div></div>';

  document.getElementById('detailModal').classList.add('open');
  const bindModelNoLinks = () => {
    document.querySelectorAll('#detailBody .modelno-link').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const tid = el.getAttribute('data-target');
        if (tid && state.cards.some(x => x.id === tid)) { closeDetail(); openDetail(tid); }
      });
    });
  };
  bindModelNoLinks();
  const editBtn = document.getElementById('editFromDetail');
  if (editBtn) editBtn.addEventListener('click', () => { closeDetail(); openEditor(c); });
  const variantTabs = document.getElementById('variantTabs');
  if (variantTabs) {
    variantTabs.addEventListener('click', (e) => {
      const btn = e.target.closest('.variant-tab');
      if (!btn) return;
      const idx = parseInt(btn.getAttribute('data-vidx'), 10);
      const views = window.__detailVariantViews || [];
      if (!views[idx]) return;
      variantTabs.querySelectorAll('.variant-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const body = document.getElementById('variantBody');
      if (body) body.innerHTML = renderTraits(views[idx].traits);
      // Base image stays fixed across tabs (per request — no image switching).
      const sf = statsFor(views[idx]);
      const sr = document.getElementById('detailStatRow');
      if (sr) sr.innerHTML = sf.html;
      const dc = document.getElementById('detailCategory');
      if (dc) dc.style.color = sf.tc;
    });
  }
  const imgWrap = document.getElementById('detailImgWrap');
  if (imgWrap) {
    if (c.image) {
      imgWrap.addEventListener('click', () => openLightbox(c.image));
    } else {
      imgWrap.addEventListener('click', () => { closeDetail(); openEditor(c); });
    }
  }
  // メダチェンジ後画像: アップロード / 削除 / 拡大
  if (isMedaChangeLeader) {
    const applyMedaChangeImage = async (newUrlOrNull) => {
      const card = state.cards.find(x => x.id === c.id);
      if (!card) return;
      const vs = (Array.isArray(card.variants) ? card.variants : []).map(v => Object.assign({}, v));
      let touched = false;
      for (const v of vs) {
        if (v && (v.tier === 'drive_a' || v.tier === 'drive_b')) {
          v.image = newUrlOrNull; touched = true;
        }
      }
      if (!touched) return;
      const updated = Object.assign({}, card, { variants: vs, updatedAt: Date.now() });
      try {
        await persistCard(updated);
        const idx = state.cards.findIndex(x => x.id === c.id);
        if (idx >= 0) state.cards[idx] = updated;
        renderAll();
        toast(newUrlOrNull ? 'メダチェンジ後画像を保存しました' : 'メダチェンジ後画像を削除しました', 'success');
        openDetail(c.id); // re-render detail with the new state
      } catch (e) {
        toast('保存失敗: ' + (e && e.message ? e.message : e), 'error');
      }
    };
    const mcFile = document.getElementById('mcImgFile');
    const mcDrop = document.getElementById('mcImgDrop');
    if (mcFile) {
      mcFile.addEventListener('change', async (e) => {
        const f = e.target.files && e.target.files[0];
        if (!f || !f.type.startsWith('image/')) { toast('画像ファイルを選択してください', 'error'); return; }
        if (!SUPABASE_ENABLED) { toast('Supabase未接続', 'error'); return; }
        try {
          toast('画像を処理中...', 'info', 1500);
          const dataUrl = await fileToDataURL(f);
          const bounds = await detectCardBounds(dataUrl);
          const useOrig = !bounds || !bounds.detected;
          const r = await cropAndResize(dataUrl, bounds, useOrig);
          const path = await uploadCardImage(c.id + '-drive', r.dataUrl);
          await applyMedaChangeImage(publicImageUrl(path));
        } catch (err) {
          toast('画像アップロード失敗: ' + (err && err.message ? err.message : err), 'error');
        }
      });
    }
    if (mcDrop) {
      mcDrop.addEventListener('dragover', (e) => { e.preventDefault(); mcDrop.classList.add('drag'); });
      mcDrop.addEventListener('dragleave', () => mcDrop.classList.remove('drag'));
      mcDrop.addEventListener('drop', (e) => {
        e.preventDefault(); mcDrop.classList.remove('drag');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f && mcFile) {
          const dt = new DataTransfer(); dt.items.add(f);
          mcFile.files = dt.files;
          mcFile.dispatchEvent(new Event('change'));
        }
      });
    }
    const mcWrap = document.getElementById('mcImgWrap');
    const mcClear = document.getElementById('mcImgClear');
    if (mcWrap && mcImg) {
      mcWrap.addEventListener('click', (e) => {
        if (e.target.id === 'mcImgClear') return;
        openLightbox(mcImg);
      });
    }
    if (mcClear) {
      mcClear.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm('メダチェンジ後画像を削除しますか?')) applyMedaChangeImage(null);
      });
    }
  }
}

    document.getElementById('cropControlsWrap').style.display = 'none';

// Collect α/β variant data from the editor form.
// If a variant's traits field is empty, fall back to the existing card's
// variant data so editing/saving the base card never wipes α/β.
function collectVariantsFromForm(existing) {
  const existingVariants = (existing && Array.isArray(existing.variants)) ? existing.variants : [];
  const findExisting = (tier) => existingVariants.find(v => v && v.tier === tier) || null;
  const cardType = getField('f_cardType');
  const partsArm = getField('f_partsArm');
  const active = activeVariantTiers(cardType, partsArm);
  const out = [];
  const managedTiers = {};

  // Simple variant block (traits + cost + image). prefix = form id prefix,
  // tier = stored variant tier.
  function collectSimple(prefix, tier, label) {
    const traitsEl = document.getElementById('f_var_' + prefix + '_traits');
    const costEl = document.getElementById('f_var_' + prefix + '_cost');
    const ex = findExisting(tier);
    if (!traitsEl) { if (ex) { out.push(ex); managedTiers[tier] = 1; } return; }
    managedTiers[tier] = 1;
    const traits = traitsEl.value.trim();
    const costRaw = costEl ? costEl.value.trim() : '';
    const pend = state.pendingVariantImages ? state.pendingVariantImages[prefix] : null;
    const exImg = (ex && ex.image != null && String(ex.image).trim() !== '')
      ? String(ex.image).trim() : null;
    let imageVal;
    if (pend === '__CLEARED__') imageVal = null;
    else if (pend) imageVal = pend;
    else imageVal = exImg;
    if (traits) {
      let nextCost = null;
      if (costRaw !== '') { const n = Number(costRaw); nextCost = Number.isFinite(n) ? n : null; }
      out.push(Object.assign({}, ex || {}, {
        tier: tier,
        label: (ex && ex.label) ? ex.label : label,
        traits: traits,
        actionCost: nextCost,
        image: imageVal,
      }));
    } else if (ex) {
      out.push(Object.assign({}, ex, { image: imageVal }));
    }
  }

  // メダチェンジ後 — リーダー: drive_a(ドライブA)+drive_b(ドライブB)
  // サポート: drive_a のみ。共通ステータス(タイプ/コスト/BP/冷却/BL/脚部/戦術)を
  // 両 variant に適用し、特性・行動と画像をそれぞれ設定。
  function collectMedaChange() {
    const isLeader = cardType === 'leader_medarot';
    managedTiers['drive_a'] = 1;
    if (isLeader) managedTiers['drive_b'] = 1;
    const exA = findExisting('drive_a');
    const exB = findExisting('drive_b');
    const tac = [getField('f_mc_tactical1'), getField('f_mc_tactical2'), getField('f_mc_tactical3')]
      .filter(Boolean);
    const bodyA = (document.getElementById('f_mc_traitsA') || {}).value || '';
    const bodyB = (document.getElementById('f_mc_traitsB') || {}).value || '';
    const hasBodyA = bodyA.trim() !== '';
    const hasBodyB = bodyB.trim() !== '';
    const traitsA = joinTactical(tac, bodyA.trim());
    const traitsB = joinTactical(tac, bodyB.trim());
    const pend = state.pendingVariantImages ? state.pendingVariantImages.mc : null;
    const exImg = ((exA && exA.image) || (exB && exB.image)) || null;
    let imageVal;
    if (pend === '__CLEARED__') imageVal = null;
    else if (pend) imageVal = pend;
    else imageVal = (exImg && String(exImg).trim() !== '') ? String(exImg).trim() : null;
    const et = elemToStore([getField('f_mc_type1'), getField('f_mc_type2')]);
    const overrides = {
      actionCost: getNumField('f_mc_actionCost'),
      bp: getNumField('f_mc_bp'),
      coolingCost: getNumField('f_mc_coolingCost'),
      barrierLimit: getNumField('f_mc_barrierLimit'),
    };
    const legV = getField('f_mc_legType');
    const anyStats = !!et || overrides.actionCost != null || overrides.bp != null ||
      overrides.coolingCost != null || overrides.barrierLimit != null ||
      (isLeader && !!legV);
    const mk = (tier, traits, ex) => {
      const v = Object.assign({}, ex || {}, overrides, {
        tier: tier,
        label: (ex && ex.label) ? ex.label : 'メダチェンジ',
        traits: traits,
        image: imageVal,
      });
      if (et) v.elementType = et; else delete v.elementType;
      if (isLeader && legV) v.legType = legV; else delete v.legType;
      return v;
    };
    // drive_a: ドライブA本文 or 画像 or 何らかのステータス or 既存があれば出力
    if (hasBodyA || imageVal || anyStats || exA) out.push(mk('drive_a', traitsA, exA));
    // drive_b: リーダーのみ。ドライブB「本文」or 既存drive_b があれば出力
    // (共通戦術行のみの traitsB では出力しない＝空ドライブBタブを防止)
    if (isLeader && (hasBodyB || exB)) out.push(mk('drive_b', traitsB, exB));
  }

  if (cardType === 'parts_card') {
    active.forEach(tier => {
      if (tier === 'alpha') collectSimple('alpha', 'alpha', '強化');
      else if (tier === 'beta') collectSimple('beta', 'beta', '強化');
      else if (tier === 'drive_a') collectSimple('driveA', 'drive_a', 'ドライブ');
      else if (tier === 'drive_b') collectSimple('driveB', 'drive_b', 'ドライブ');
    });
  } else if (cardType === 'leader_medarot' || cardType === 'support_medarot') {
    collectMedaChange();
  }

  // Preserve any variants whose tier the active editor does not manage,
  // so saving never silently drops unrelated variant data.
  for (const ev of existingVariants) {
    if (ev && ev.tier && !managedTiers[ev.tier]) out.push(ev);
  }
  return out;
}

async function processNextInQueue() {

async function rotateImage90CW() {
  if (!state.pendingOrigImage) return;
  const btn = document.getElementById('rotateBtn');
  btn.disabled = true;
  try {
    const img = await loadImage(state.pendingOrigImage);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalHeight;
    canvas.height = img.naturalWidth;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(Math.PI / 2);
    ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
    state.pendingOrigImage = canvas.toDataURL('image/jpeg', 0.95);
    document.getElementById('origPreview').src = state.pendingOrigImage;

    setCropStatus('回転後、再検出中...', 'success');
    const bounds = await detectCardBounds(state.pendingOrigImage);
    state.pendingDetectedBounds = bounds;
    if (bounds.detected) {
      setCropStatus('枠を検出 — ' + Math.round((1 - bounds.ratio) * 100) + '% トリミング', 'success');
    } else if (bounds.almostFull) {
      setCropStatus('画像は既にトリミング済みです', 'original');
    } else {
      setCropStatus('枠を検出できませんでした → オリジナルを使用', 'fail');
    }
    await refreshCroppedPreview();
  } catch (e) {
    toast('回転処理に失敗: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

async function handleImageFile(file) {
  if (!file || !file.type.startsWith('image/')) { toast('画像ファイルを選択してください', 'error'); return; }
  if (file.size > 12 * 1024 * 1024) toast('画像サイズが大きいです(12MB超)', 'info');
  try {
    const dataUrl = await fileToDataURL(file);
    state.pendingOrigImage = dataUrl;
    document.getElementById('origPreview').src = dataUrl;
    document.getElementById('cropControlsWrap').style.display = 'flex';
    setCropStatus('カード枠を検出中...', 'success');
    const bounds = await detectCardBounds(dataUrl);
    state.pendingDetectedBounds = bounds;
    if (bounds.detected) {
      setCropStatus('枠を検出 — ' + Math.round((1 - bounds.ratio) * 100) + '% トリミング', 'success');
    } else if (bounds.almostFull) {
      setCropStatus('画像は既にトリミング済みです', 'original');
    } else {
      setCropStatus('枠を検出できませんでした → オリジナルを使用', 'fail');
    }
    await refreshCroppedPreview();
    hideStatus();
  } catch (e) {
    toast('画像読み込み失敗: ' + e.message, 'error');
  }
}

async function saveFromForm() {
  const name = getField('f_name').trim();
  if (!name) { showStatus('カード名を入力してください', 'error'); return; }
  const now = Date.now();
  const existing = state.editingId ? state.cards.find(c => c.id === state.editingId) : null;
  const cardId = state.editingId || genId();

  // 画像処理: dataURLなら新規アップロード、既にURLなら既存パスを保持
  let imagePath = existing ? existing.imagePath : null;
  let imageUrl = state.pendingImage;
  const isNewImage = state.pendingImage && state.pendingImage.startsWith('data:');
  if (isNewImage && SUPABASE_ENABLED) {
    try {
      showStatus('画像をアップロード中...', 'info');
      // 既存画像があれば削除
      if (existing && existing.imagePath) {
        await deleteCardImage(existing.imagePath);
      }
      imagePath = await uploadCardImage(cardId, state.pendingImage);
      imageUrl = publicImageUrl(imagePath);
    } catch (e) {
      showStatus('画像アップロード失敗: ' + e.message, 'error');
      return;
    }
  } else if (!state.pendingImage && existing && existing.imagePath) {
    // 画像が削除された
    await deleteCardImage(existing.imagePath);
    imagePath = null;
    imageUrl = null;
  }

  const card = {
    id: cardId,
    cardType: getField('f_cardType'),
    name: name,
    elementType: getElementTypeStore(),
    actionCost: getNumField('f_actionCost'),
    bp: getNumField('f_bp'),
    coolingCost: getNumField('f_coolingCost'),
    legType: getField('f_legType').trim() || null,
    partsArm: getField('f_partsArm') || null,
    partsMode: existing ? (existing.partsMode || null) : null,
    bonusValue: getNumField('f_bonusValue'),
    barrierLimit: getNumField('f_barrierLimit'),
    variants: collectVariantsFromForm(existing),
    traits: joinTactical(
      [getField('f_tactical1'), getField('f_tactical2'), getField('f_tactical3')].filter(Boolean),
      getField('f_traits').trim()),
    effectText: getField('f_effectText').trim() || null,
    notes: buildMeta(getField('f_modelNo'), getField('f_medarotName'), state.pendingNotesRest || ''),
    image: imageUrl,
    imagePath: imagePath,
    createdAt: existing ? existing.createdAt : now,
    updatedAt: now,
  };
  try {
    // Upload any variant images (α/β/ドライブ/メダチェンジ後) still raw dataURLs
    if (Array.isArray(card.variants) && card.variants.length && SUPABASE_ENABLED) {
      for (const v of card.variants) {
        if (v && typeof v.image === 'string' && v.image.startsWith('data:')) {
          try {
            const vp = await uploadCardImage(cardId + '-' + v.tier, v.image);
            if (vp) v.image = publicImageUrl(vp);
          } catch (ve) {
            const lbl = v.tier === 'alpha' ? 'α' : v.tier === 'beta' ? 'β'
              : v.tier === 'drive_a' ? 'ドライブA/メダチェンジ後' : v.tier === 'drive_b' ? 'ドライブB' : v.tier;
            toast(lbl + '画像アップロード失敗: ' + ve.message, 'error');
          }
        }
      }
    }
    await persistCard(card);
    const idx = state.cards.findIndex(x => x.id === card.id);
    if (idx >= 0) state.cards[idx] = card; else state.cards.push(card);
    const wasUpdate = !!existing;
    const hasMore = state.uploadQueue.length > 0;
    closeEditor(true);
    renderAll();
    toast(wasUpdate ? 'カードを更新しました' : 'カードを保存しました', 'success');
    if (hasMore) {
      setTimeout(processNextInQueue, 250);
    }
  } catch (e) {
    showStatus('保存失敗: ' + e.message, 'error');
  }
}

    app: 'medarot-rb-cardbase',
    schemaVersion: SCHEMA_VERSION,

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');

  const ymd = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  a.download = 'medarot-rb-cards-' + ymd + '.json';
  document.body.appendChild(a);
  a.click();

}

async function importJsonFile(file) {
  if (!file) return;
  const modeRadio = document.querySelector('input[name="importMode"]:checked');
  const mode = modeRadio ? modeRadio.value : 'merge';

    const text = await file.text();
    let data;
    try { data = JSON.parse(text); }
    catch (e) { toast('JSON 解析失敗: ' + e.message, 'error'); return; }
    const cards = Array.isArray(data && data.cards) ? data.cards
                : Array.isArray(data) ? data : null;
    if (!cards) { toast('不正な形式: cards 配列が見つかりません', 'error'); return; }

    if (mode === 'replace') {
      if (!confirm('現在の ' + state.cards.length + ' 件のカードをすべて削除して、\n' + cards.length + ' 件で置き換えますか?')) return;
      for (const c of state.cards) await deleteCardFromStorage(c.id);
      state.cards = [];
    }
    let added = 0, updated = 0, skipped = 0, failed = 0;
    const failedNames = [];
    let firstError = null;
    const existingIds = new Set(state.cards.map(c => c.id));
    for (const raw of cards) {
      if (!raw || typeof raw !== 'object' || !raw.name) { skipped++; continue; }
      const id = raw.id || genId();
      const exists = existingIds.has(id);
      if (exists && mode === 'merge') { skipped++; continue; }
      const existing = exists ? state.cards.find(c => c.id === id) : null;
      // For upsert mode: preserve existing image if new card lacks one,

      const card = {
        id: id,
        cardType: CARD_CATEGORIES[raw.cardType] ? raw.cardType : 'leader_medarot',
        name: String(raw.name),
        elementType: elemToStore(raw.elementType),
        actionCost: typeof raw.actionCost === 'number' ? raw.actionCost : null,
        bp: typeof raw.bp === 'number' ? raw.bp : null,
        coolingCost: typeof raw.coolingCost === 'number' ? raw.coolingCost : null,
        legType: raw.legType || null,
        partsArm: (raw.partsArm === 'L' || raw.partsArm === 'R') ? raw.partsArm : null,
        partsMode: (raw.partsMode === '行動' || raw.partsMode === '戦術') ? raw.partsMode : null,
        bonusValue: typeof raw.bonusValue === 'number' ? raw.bonusValue : null,
        barrierLimit: typeof raw.barrierLimit === 'number' ? raw.barrierLimit : null,
        variants: Array.isArray(raw.variants) ? raw.variants.filter(v => v && typeof v === 'object' && v.tier).map(v => {
          // Preserve a previously-uploaded α/β image when the imported
          // payload omits it (image:null). Mirrors the base-image guard
          // below so re-importing a text-only JSON never wipes variant art.
          const exVar = (existing && Array.isArray(existing.variants))
            ? existing.variants.find(ev => ev && ev.tier === String(v.tier))
            : null;
          const ov = {
            tier: String(v.tier),
            label: v.label != null ? String(v.label) : null,
            traits: v.traits != null ? String(v.traits) : null,
            actionCost: typeof v.actionCost === 'number' ? v.actionCost : null,
            image: (v.image != null && v.image !== '') ? String(v.image)
                  : (exVar && exVar.image) ? exVar.image : null,
          };
          // Optional per-variant overrides (only attach when valid; absent = inherit base)
          { const et = elemToStore(v.elementType); if (et) ov.elementType = et; }
          if (typeof v.barrierLimit === 'number') ov.barrierLimit = v.barrierLimit;
          if (typeof v.partsMode === 'string' && v.partsMode) ov.partsMode = v.partsMode;
          if (typeof v.bonusValue === 'number') ov.bonusValue = v.bonusValue;
          if (typeof v.bp === 'number') ov.bp = v.bp;
          if (typeof v.coolingCost === 'number') ov.coolingCost = v.coolingCost;
          if (typeof v.legType === 'string' && v.legType) ov.legType = v.legType;
          return ov;
        }) : [],
        traits: raw.traits || null,
        effectText: raw.effectText || null,
        notes: raw.notes || null,
        // Preserve existing image when upserting if the new payload has none
        image: raw.image || (existing ? existing.image : null) || null,
        // Preserve image_path on upsert. cardToDb writes image_path from
        // card.imagePath, so omitting it here would blank the stored image.
        imagePath: raw.imagePath || (existing ? existing.imagePath : null) || null,
        createdAt: (existing && existing.createdAt) || raw.createdAt || Date.now(),
        updatedAt: Date.now(),
      };
      try {
        await persistCard(card);
        const idx = state.cards.findIndex(c => c.id === card.id);
        if (idx >= 0) { state.cards[idx] = card; updated++; }
        else { state.cards.push(card); added++; existingIds.add(card.id); }
      } catch (err) {
        failed++;
        failedNames.push(card.name);
        if (!firstError) firstError = err && err.message ? err.message : String(err);
        console.error('Import failed:', card.name, err);
      }
    }
    renderAll();
    closeImportModal();
    if (failed > 0) {
      const detail = firstError ? '\n[エラー: ' + firstError.slice(0, 300) + ']' : '';
      toast('追加 ' + added + ' / 更新 ' + updated + ' / スキップ ' + skipped + ' / 失敗 ' + failed + detail, 'error', 10000);
    } else {
      toast('追加 ' + added + ' / 更新 ' + updated + ' / スキップ ' + skipped, 'success');
    }
  } catch (e) {
    toast('インポート失敗: ' + e.message, 'error');
  }
}

function wire() {
  document.getElementById('fabAdd').addEventListener('click', function() { openEditor(null); });
  document.getElementById('exportBtn').addEventListener('click', exportJson);
  document.getElementById('importBtn').addEventListener('click', openImportModal);

  document.getElementById('search').addEventListener('input', function(e) { state.search = e.target.value; renderGrid(); });
  document.getElementById('bpMin').addEventListener('input', function(e) { state.bpMin = e.target.value; renderGrid(); });
  document.getElementById('bpMax').addEventListener('input', function(e) { state.bpMax = e.target.value; renderGrid(); });
  document.getElementById('costMin').addEventListener('input', function(e) { state.costMin = e.target.value; renderGrid(); });
  document.getElementById('costMax').addEventListener('input', function(e) { state.costMax = e.target.value; renderGrid(); });
  document.getElementById('legFilter').addEventListener('input', function(e) { state.legFilter = e.target.value; renderGrid(); });
  document.getElementById('partsArmFilter').addEventListener('change', function(e) { state.partsArmFilter = e.target.value; renderGrid(); });
  document.getElementById('partsModeFilter').addEventListener('change', function(e) { state.partsModeFilter = e.target.value; renderGrid(); });
  document.getElementById('sortSelect').addEventListener('change', function(e) { state.sortBy = e.target.value; renderGrid(); });
  document.getElementById('clearFilters').addEventListener('click', function() {
    state.search = ''; state.elementType = '';
    state.bpMin = ''; state.bpMax = ''; state.costMin = ''; state.costMax = '';
    state.legFilter = ''; state.partsArmFilter = ''; state.partsModeFilter = '';
    state.sortBy = 'updated-desc';
    document.getElementById('search').value = '';
    ['bpMin','bpMax','costMin','costMax','legFilter'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('partsArmFilter').value = '';
    document.getElementById('partsModeFilter').value = '';
    document.getElementById('sortSelect').value = 'updated-desc';
    renderAll();
    toast('フィルタをリセットしました', 'info', 1800);
  });

  document.getElementById('uploadClose').addEventListener('click', closeEditor);
  document.getElementById('cancelBtn').addEventListener('click', closeEditor);
  document.getElementById('saveBtn').addEventListener('click', saveFromForm);
  document.getElementById('deleteBtn').addEventListener('click', deleteCurrent);
  document.getElementById('f_cardType').addEventListener('change', function(e) { toggleFieldsForCardType(e.target.value); });
  document.getElementById('f_partsArm').addEventListener('change', function() { toggleFieldsForCardType(getField('f_cardType')); });

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', function(e) {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    enqueueFiles(files);
    e.target.value = '';
  });
  ['dragenter','dragover'].forEach(function(ev) {
    dropzone.addEventListener(ev, function(e) { e.preventDefault(); dropzone.classList.add('dragover'); });
  });
  ['dragleave','dragend','drop'].forEach(function(ev) {
    dropzone.addEventListener(ev, function(e) { e.preventDefault(); dropzone.classList.remove('dragover'); });
  });
  dropzone.addEventListener('drop', function(e) {
    const files = Array.from(e.dataTransfer.files || []).filter(function(f) { return f.type.startsWith('image/'); });
    if (files.length === 0) return;
    enqueueFiles(files);
  });

  ['alpha', 'beta', 'driveA', 'driveB', 'mc'].forEach(function(prefix) {
    const dz = document.getElementById('var_' + prefix + '_dropzone');
    const fi = document.getElementById('f_var_' + prefix + '_imgfile');
    const clr = document.getElementById('var_' + prefix + '_clear');
    if (fi) {
      fi.addEventListener('change', function(e) {
        const f = (e.target.files || [])[0];
        if (f) handleVariantImageFile(prefix, f);
        e.target.value = '';
      });
    }
    if (dz) {
      ['dragenter','dragover'].forEach(function(ev) {
        dz.addEventListener(ev, function(e) { e.preventDefault(); dz.classList.add('dragover'); });
      });
      ['dragleave','dragend','drop'].forEach(function(ev) {
        dz.addEventListener(ev, function(e) { e.preventDefault(); dz.classList.remove('dragover'); });
      });
      dz.addEventListener('drop', function(e) {
        const f = Array.from(e.dataTransfer.files || []).filter(function(x) { return x.type.startsWith('image/'); })[0];
        if (f) handleVariantImageFile(prefix, f);
      });
    }
    if (clr) clr.addEventListener('click', function() { clearVariantImage(prefix); });
  });

  document.getElementById('useOriginalToggle').addEventListener('change', async function(e) {
    state.useOriginal = e.target.checked;
    if (state.pendingOrigImage) {
      if (state.useOriginal) {
        setCropStatus('オリジナルを使用中', 'original');
      } else if (state.pendingDetectedBounds && state.pendingDetectedBounds.detected) {
        const r = state.pendingDetectedBounds.ratio;
        setCropStatus('枠を検出 — ' + Math.round((1 - r) * 100) + '% トリミング', 'success');
      } else if (state.pendingDetectedBounds && state.pendingDetectedBounds.almostFull) {
        setCropStatus('画像は既にトリミング済みです', 'original');
      } else {
        setCropStatus('枠を検出できませんでした → オリジナルを使用', 'fail');
      }
      await refreshCroppedPreview();
    }
  });

  document.getElementById('rotateBtn').addEventListener('click', rotateImage90CW);

  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('lightbox').addEventListener('click', closeLightbox);
  document.getElementById('lightboxClose').addEventListener('click', function(e) { e.stopPropagation(); closeLightbox(); });

  document.getElementById('importClose').addEventListener('click', closeImportModal);
  document.querySelectorAll('.import-radio').forEach(function(r) {
    r.addEventListener('click', function() {
      document.querySelectorAll('.import-radio').forEach(function(x) { x.classList.remove('selected'); });
      r.classList.add('selected');
      const radio = r.querySelector('input[type=radio]');
      if (radio) radio.checked = true;
    });
  });
  const importDrop = document.getElementById('importDrop');
  const importFile = document.getElementById('importFile');
  importFile.addEventListener('change', function(e) {
    const f = e.target.files && e.target.files[0];
    if (f) importJsonFile(f);
  });
  ['dragenter','dragover'].forEach(function(ev) {
    importDrop.addEventListener(ev, function(e) { e.preventDefault(); importDrop.classList.add('dragover'); });
  });
  ['dragleave','dragend','drop'].forEach(function(ev) {
    importDrop.addEventListener(ev, function(e) { e.preventDefault(); importDrop.classList.remove('dragover'); });
  });
  importDrop.addEventListener('drop', function(e) {
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) importJsonFile(f);
  });

  document.getElementById('uploadModal').addEventListener('click', function(e) {
    if (e.target.id === 'uploadModal') closeEditor();
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeDetail();
  });
  document.getElementById('importModal').addEventListener('click', function(e) {
    if (e.target.id === 'importModal') closeImportModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (document.getElementById('lightbox').classList.contains('open')) return closeLightbox();
      if (document.getElementById('uploadModal').classList.contains('open')) return closeEditor();
      if (document.getElementById('detailModal').classList.contains('open')) return closeDetail();
      if (document.getElementById('importModal').classList.contains('open')) return closeImportModal();
      if (document.getElementById('deckOverlay').classList.contains('open')) return closeDeckBuilder();
    }
    const tag = document.activeElement && document.activeElement.tagName;
    const inField = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    const inModal = !!document.querySelector('.modal-overlay.open');
    if (e.key === '/' && !inField && !inModal) {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if ((e.key === 'n' || e.key === 'N') && !inField && !inModal) {
      e.preventDefault();
      openEditor(null);
    }
  });
  wireDeckBuilder();
}

async function init() {
  wire();
  renderAll();
  // 接続状態インジケータ更新 + 疎通テスト
  const indicator = document.getElementById('cloudIndicator');
  if (!SUPABASE_ENABLED) {
    if (indicator) {
      indicator.classList.add('offline');
      indicator.title = 'Supabase 未接続';
    }
    state.loading = false;
    renderAll();
    return;
  }
  // Supabase疎通テスト
  try {
    const testUrl = SUPABASE_URL + '/rest/v1/cards?select=id&limit=1';
    const resp = await fetch(testUrl, { headers: supaHeaders() });
    if (!resp.ok) {
      const txt = await resp.text().catch(() => '');
      throw new Error('HTTP ' + resp.status + ': ' + txt.slice(0, 200));
    }
    if (indicator) indicator.title = 'Supabase 接続中';
  } catch (e) {
    if (indicator) {
      indicator.classList.add('offline');
      indicator.title = '接続失敗: ' + e.message;
    }
    toast('Supabase接続失敗: ' + e.message, 'error', 8000);
    state.loading = false;
    renderAll();
    return;
  }
  // 既存カードをSupabaseから取得
  try {
    const cards = await loadAllCards();
    state.cards = cards;
    state.loading = false;
    renderAll();
  } catch (e) {
    state.loading = false;
    renderAll();
    toast('カード読み込み失敗: ' + e.message, 'error', 5000);
  }
  // デッキ一覧をSupabaseから取得（失敗してもカード機能は継続）
  try {
    deckState.decks = await loadAllDecks();
  } catch (e) {
    toast('デッキ読み込み失敗: ' + e.message, 'error', 5000);
  }
}
init();
</script>
