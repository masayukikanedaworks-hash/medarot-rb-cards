<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06080c">
<title>MEDAROT RB // CARDBASE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-0:#06080c;--bg-1:#0d1219;--bg-2:#141b27;--bg-3:#1d2638;--border-1:#2a3447;--border-2:#3a4660;--border-3:#525f7c;--text-1:#e8ecf2;--text-2:#aab4c6;--text-3:#6b7689;--orange:#ff6b1a;--orange-bright:#ff8a44;--orange-soft:rgba(255,107,26,.13);--orange-glow:rgba(255,107,26,.45);--cyan:#22d3ee;--cyan-soft:rgba(34,211,238,.1);--cyan-glow:rgba(34,211,238,.35);--t-melee:#ef4444;--t-shoot:#f59e0b;--t-assist:#10b981;--t-install:#a855f7;--t-heal:#ec4899;--t-defend:#3b82f6;--sh-2:0 8px 24px rgba(0,0,0,.5);--sh-3:0 16px 48px rgba(0,0,0,.7);--f-display:'Chakra Petch','Zen Kaku Gothic New',sans-serif;--f-body:'Zen Kaku Gothic New',sans-serif;--f-mono:'JetBrains Mono',monospace;--clip-sm:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);--clip-md:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);--clip-lg:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--f-body);background:var(--bg-0);color:var(--text-1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 80% 60% at top left,rgba(255,107,26,.07),transparent 60%),radial-gradient(ellipse 60% 60% at bottom right,rgba(34,211,238,.05),transparent 60%),linear-gradient(rgba(255,255,255,.014) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px);background-size:auto,auto,28px 28px,28px 28px;background-attachment:fixed;min-height:100vh;overflow-x:hidden}
button{font-family:inherit}
.header{position:sticky;top:0;z-index:50;background:rgba(7,10,16,.85);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--border-1)}
.header::after{content:"";display:block;height:1px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.4}
.header-inner{max-width:1400px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
@media(min-width:720px){.header-inner{padding:14px 24px;gap:16px}}
.brand{display:flex;align-items:baseline;gap:10px;flex-shrink:0}
.brand-mark{font-family:var(--f-display);font-weight:700;font-size:17px;letter-spacing:.08em;color:var(--orange);text-shadow:0 0 18px var(--orange-glow);display:flex;align-items:center;gap:8px}
.brand-mark::before{content:"";display:inline-block;width:10px;height:10px;background:var(--orange);box-shadow:0 0 10px var(--orange);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}
@media(min-width:720px){.brand-mark{font-size:20px}}
.brand-sub{font-family:var(--f-mono);font-size:9px;letter-spacing:.3em;color:var(--text-3);text-transform:uppercase;display:none}
@media(min-width:540px){.brand-sub{display:inline}}
.header-tools{margin-left:auto;display:flex;align-items:center;gap:8px}
.cloud-indicator{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;color:var(--cyan);position:relative}
.cloud-indicator svg{width:18px;height:18px}
.cloud-indicator::after{content:"";position:absolute;bottom:6px;right:4px;width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 6px var(--cyan);animation:pulse 2s ease-in-out infinite;border:1px solid var(--bg-0)}
.cloud-indicator.offline{color:var(--text-3)}
.cloud-indicator.offline::after{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:none}
.icon-btn{background:var(--bg-1);border:1px solid var(--border-1);color:var(--text-2);width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s;clip-path:var(--clip-sm)}
.icon-btn:hover{color:var(--orange);border-color:var(--orange);background:var(--bg-2)}
.icon-btn:active{transform:scale(.95)}
.icon-btn svg{width:16px;height:16px}
.stat-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-mono);font-size:11px;color:var(--text-2);border:1px solid var(--border-1);padding:6px 12px;background:var(--bg-1);clip-path:var(--clip-sm)}
.stat-pill b{color:var(--cyan);font-weight:600}
.stat-pill::before{content:"";width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 6px var(--cyan);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.app{max-width:1400px;margin:0 auto;padding:18px 14px 120px}
@media(min-width:720px){.app{padding:24px 24px 140px}}
.section-label{font-family:var(--f-display);font-size:10px;letter-spacing:.25em;color:var(--text-3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::before{content:"";width:16px;height:1px;background:var(--orange)}
.tabs-wrap{margin-bottom:14px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:2px}
.tab{font-family:var(--f-display);font-weight:600;font-size:10px;letter-spacing:.03em;padding:8px 4px;background:var(--bg-1);border:1px solid var(--border-1);color:var(--text-2);cursor:pointer;transition:all .15s;clip-path:var(--clip-sm);white-space:nowrap;text-align:center;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tab:hover{color:var(--text-1);background:var(--bg-2)}
.tab.active{background:var(--orange-soft);border-color:var(--orange);color:var(--orange);box-shadow:0 0 16px rgba(255,107,26,.18)}
.tab .count{margin-left:4px;font-family:var(--f-mono);font-size:9px;opacity:.75;font-weight:400}
.tab.active .count{opacity:1}
@media(min-width:540px){.tabs{grid-template-columns:repeat(8,1fr);gap:6px}.tab{font-size:11px;padding:9px 6px}}
.search-collapse{margin-bottom:14px;background:var(--bg-1);border:1px solid var(--border-1);clip-path:var(--clip-md);overflow:hidden}
.search-collapse[open]{background:var(--bg-1)}
.search-toggle{list-style:none;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:var(--f-display);font-size:11px;letter-spacing:.12em;color:var(--text-2);text-transform:uppercase;font-weight:600;user-select:none;transition:background .15s}
.search-toggle::-webkit-details-marker{display:none}
.search-toggle:hover{background:var(--bg-2)}
.search-collapse[open] .search-toggle{border-bottom:1px solid var(--border-1);color:var(--orange)}
.search-toggle-icon{font-size:13px;line-height:1}
.search-toggle-label{flex:0 1 auto}
.search-toggle-state{margin-left:auto;font-family:var(--f-mono);font-size:10px;color:var(--cyan);background:var(--cyan-soft);border:1px solid var(--cyan);padding:2px 8px;letter-spacing:.04em;display:none}
.search-toggle-state.active{display:inline}
.search-toggle-arrow{font-size:10px;color:var(--text-3);transition:transform .2s ease;margin-left:6px}
.search-collapse[open] .search-toggle-arrow{transform:rotate(180deg)}
.filters{background:transparent;border:none;padding:10px 12px 6px;margin-bottom:0;display:grid;grid-template-columns:1fr;gap:8px;clip-path:none;position:relative}
.filters::before{display:none}
@media(min-width:880px){.filters{grid-template-columns:1fr auto;align-items:center;padding:12px 14px 6px}}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap::before{content:"▸";position:absolute;left:12px;color:var(--orange);font-family:var(--f-mono);font-size:11px;pointer-events:none}
.search-wrap::after{content:"/";position:absolute;right:12px;color:var(--text-3);font-family:var(--f-mono);font-size:10px;border:1px solid var(--border-1);padding:1px 6px;pointer-events:none;background:var(--bg-2)}
.search{width:100%;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:10px 38px 10px 28px;font-family:var(--f-mono);font-size:13px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--cyan)}
.search::placeholder{color:var(--text-3);letter-spacing:.05em}
.filter-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.type-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-family:var(--f-display);font-size:11px;letter-spacing:.04em;padding:6px 11px;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-2);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;font-weight:600}
.chip::before{content:"";width:7px;height:7px;display:inline-block;background:var(--chip-color,var(--text-3));box-shadow:0 0 7px var(--chip-color,transparent)}
.chip:hover{color:var(--text-1);border-color:var(--border-2)}
.chip.active{color:var(--text-1);background:var(--bg-3);border-color:var(--chip-color,var(--orange))}
.adv-filters{background:transparent;border:none;padding:6px 12px 12px;margin-bottom:0;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;clip-path:none}
.range-group{display:flex;flex-direction:column;gap:4px}
.range-group-label{font-family:var(--f-display);font-size:9px;letter-spacing:.16em;color:var(--text-3);text-transform:uppercase;font-weight:600}
.range-inputs{display:flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:11px;color:var(--text-3)}
.range-inputs input{width:54px;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:6px 7px;font-family:var(--f-mono);font-size:12px;outline:none;text-align:center;transition:border-color .15s}
.range-inputs input:focus{border-color:var(--cyan)}
.range-inputs input[type=text]{width:110px;text-align:left}
.sort-select{background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:8px 11px;font-family:var(--f-mono);font-size:12px;outline:none;cursor:pointer;transition:border-color .15s}
.sort-select:focus{border-color:var(--cyan)}
.clear-btn{background:transparent;border:1px solid var(--border-1);color:var(--text-3);font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;padding:7px 12px;cursor:pointer;transition:all .15s;text-transform:uppercase}
.clear-btn:hover{color:var(--orange);border-color:var(--orange)}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
@media(min-width:540px){.grid{grid-template-columns:repeat(6,1fr);gap:8px}}
@media(min-width:880px){.grid{grid-template-columns:repeat(8,1fr);gap:10px}}
.card{position:relative;background:var(--bg-1);border:1px solid var(--border-1);cursor:pointer;overflow:hidden;transition:transform .2s cubic-bezier(.2,.8,.2,1),border-color .18s,box-shadow .18s;clip-path:var(--clip-md);animation:cardIn .35s cubic-bezier(.2,.8,.2,1) backwards}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-3px);border-color:var(--orange);box-shadow:0 14px 38px rgba(255,107,26,.2)}
.card:active{transform:translateY(-1px)}
.card-image{width:100%;aspect-ratio:5/7;background:#fff;position:relative;overflow:hidden}
.card-image img{width:100%;height:100%;object-fit:contain;display:block;transition:transform .4s;transform:scale(1.03)}
.card:hover .card-image img{transform:scale(1.06)}
.card-image-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-3);font-family:var(--f-mono);font-size:10px;letter-spacing:.2em;gap:6px;cursor:pointer;transition:background .15s,color .15s;background:#f4f6fa}
.card-image-empty::before{content:"⬆";font-size:28px;opacity:.55;color:var(--orange)}
.card-image-empty:hover{background:#fff4ec;color:var(--orange)}
.card-image-empty:hover::before{opacity:1}
.card-image-empty span{font-size:9px;letter-spacing:.16em;color:#7a8398}
.card-tag{position:absolute;top:3px;left:3px;font-family:var(--f-display);font-size:7px;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.82);padding:2px 4px;border-left:2px solid var(--tag-color,var(--orange));font-weight:600;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.card-cost-badge{position:absolute;top:3px;right:3px;font-family:var(--f-mono);font-weight:700;font-size:10px;color:var(--orange);background:rgba(0,0,0,.85);padding:2px 5px;border:1px solid var(--orange);min-width:20px;text-align:center;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.card-vbadges{position:absolute;bottom:3px;right:3px;display:flex;gap:3px;z-index:2}
.card-vbadge{font-family:var(--f-mono);font-weight:700;font-size:10px;line-height:1;color:var(--orange);background:rgba(0,0,0,.85);padding:3px 5px;border:1px solid var(--orange);border-radius:2px;box-shadow:0 2px 6px rgba(0,0,0,.45)}
.card-info{padding:5px 6px 6px;border-top:1px solid var(--border-1);background:var(--bg-1)}
.card-name{font-family:var(--f-body);font-weight:700;font-size:10px;color:var(--text-1);line-height:1.25;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em}
.card-meta{display:flex;gap:4px;flex-wrap:wrap;font-family:var(--f-mono);font-size:8px;color:var(--text-3)}
.card-meta span{display:inline-flex;align-items:center;gap:2px}
.card-meta b{color:var(--cyan);font-weight:600}
@media(min-width:540px){.card-tag{font-size:9px;padding:3px 7px}.card-cost-badge{font-size:12px;padding:3px 7px}.card-vbadge{font-size:12px;padding:4px 6px}.card-info{padding:8px 10px 10px}.card-name{font-size:12px;margin-bottom:5px}.card-meta{font-size:10px;gap:6px}}
.empty{padding:80px 24px;text-align:center;border:1px dashed var(--border-1);background:rgba(13,18,25,.4);clip-path:var(--clip-md)}
.empty-icon{font-family:var(--f-mono);font-size:32px;color:var(--text-3);letter-spacing:.25em;margin-bottom:14px;opacity:.6}
.empty-title{font-family:var(--f-display);font-size:16px;color:var(--text-2);margin-bottom:8px;letter-spacing:.08em;font-weight:600}
.empty-sub{font-size:13px;color:var(--text-3);max-width:320px;margin:0 auto;line-height:1.6}
.empty-sub b{color:var(--orange)}
.fab{position:fixed;bottom:22px;right:22px;z-index:60;width:58px;height:58px;background:var(--orange);color:#fff;border:none;font-family:var(--f-display);font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 10px 28px var(--orange-glow),0 0 0 1px var(--orange);transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .2s;clip-path:var(--clip-md);display:flex;align-items:center;justify-content:center;line-height:1}
.fab:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 14px 36px var(--orange-glow),0 0 0 1px var(--orange)}
.fab:active{transform:scale(.95)}
@media(min-width:720px){.fab{width:60px;height:60px;bottom:28px;right:28px}}
.modal-overlay{position:fixed;inset:0;background:rgba(2,4,8,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:12px 8px}
.modal-overlay.open{display:flex}
.modal-overlay.open .modal{animation:modalIn .25s cubic-bezier(.2,.8,.2,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal{background:var(--bg-1);border:1px solid var(--border-2);width:100%;max-width:720px;position:relative;box-shadow:var(--sh-3);clip-path:var(--clip-lg);margin:auto;max-height:calc(100vh - 24px);display:flex;flex-direction:column}
.modal-head{padding:10px 14px;border-bottom:1px solid var(--border-1);display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(90deg,var(--bg-2),var(--bg-1));flex-shrink:0}
.queue-badge{font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;color:var(--cyan);background:var(--cyan-soft);border:1px solid var(--cyan);padding:4px 10px;margin-left:auto;margin-right:4px;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:6px;clip-path:var(--clip-sm)}
.queue-badge::before{content:"";width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 6px var(--cyan);animation:pulse 1.4s ease-in-out infinite}
.modal-title{font-family:var(--f-display);font-size:12px;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:6px}
.modal-title::before{content:"▰";font-size:9px;opacity:.8}
.modal-close{background:transparent;border:1px solid var(--border-1);color:var(--text-2);width:28px;height:28px;font-size:12px;cursor:pointer;font-family:var(--f-mono);transition:all .15s;flex-shrink:0}
.modal-close:hover{color:var(--orange);border-color:var(--orange)}
.modal-body{padding:12px;display:grid;gap:10px;overflow-y:auto;flex:1 1 auto;min-height:0}
@media(min-width:540px){.modal-head{padding:14px 18px}.modal-title{font-size:14px;letter-spacing:.14em}.modal-title::before{font-size:10px}.modal-close{width:32px;height:32px;font-size:14px}.modal-body{padding:18px;gap:16px}}
.dropzone{border:1px dashed var(--border-2);background:var(--bg-0);padding:26px 16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;display:block}
.dropzone:hover,.dropzone.dragover{border-color:var(--orange);background:var(--orange-soft)}
.dropzone-icon{font-family:var(--f-mono);font-size:22px;color:var(--orange);margin-bottom:8px;opacity:.8}
.dropzone-text{font-family:var(--f-mono);font-size:12px;color:var(--text-2);letter-spacing:.06em}
.dropzone-hint{font-family:var(--f-mono);font-size:10px;color:var(--text-3);margin-top:6px}
.dropzone input{display:none}
.preview-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.preview-block{border:1px solid var(--border-1);background:var(--bg-0);padding:8px}
.preview-label{font-family:var(--f-mono);font-size:9px;letter-spacing:.16em;color:var(--text-3);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.preview-label small{color:var(--cyan);font-size:9px;font-weight:600}
.preview-img{width:100%;aspect-ratio:5/7;object-fit:contain;background:var(--bg-0);display:block}
.crop-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 12px;background:var(--bg-0);border:1px solid var(--border-1)}
.rotate-btn{background:var(--bg-1);border:1px solid var(--border-2);color:var(--text-2);width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;clip-path:var(--clip-sm);padding:0}
.rotate-btn:hover{color:var(--orange);border-color:var(--orange);background:var(--bg-2)}
.rotate-btn:active{transform:scale(.9) rotate(-90deg)}
.rotate-btn:disabled{opacity:.4;cursor:not-allowed}
.rotate-btn svg{width:14px;height:14px}
.crop-status{font-family:var(--f-mono);font-size:11px;flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.crop-status.success{color:#34d399}
.crop-status.fail{color:#f59e0b}
.crop-status.original{color:var(--text-3)}
.crop-status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;flex-shrink:0}
.toggle{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-mono);font-size:11px;color:var(--text-2);cursor:pointer;user-select:none}
.toggle input{display:none}
.toggle-track{width:30px;height:16px;background:var(--bg-3);border-radius:8px;position:relative;transition:background .15s;border:1px solid var(--border-2)}
.toggle-track::after{content:"";position:absolute;top:1px;left:1px;width:12px;height:12px;background:var(--text-3);border-radius:50%;transition:transform .18s,background .18s}
.toggle input:checked + .toggle-track{background:var(--orange-soft);border-color:var(--orange)}
.toggle input:checked + .toggle-track::after{transform:translateX(14px);background:var(--orange)}
.btn{font-family:var(--f-display);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;border:1px solid var(--border-2);background:var(--bg-2);color:var(--text-1);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}
@media(min-width:540px){.btn{font-size:12px;padding:10px 16px;letter-spacing:.1em;gap:7px}}
.btn:hover:not(:disabled){background:var(--bg-3);border-color:var(--border-3)}
.btn:active:not(:disabled){transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-primary:hover:not(:disabled){background:var(--orange-bright);box-shadow:0 0 22px var(--orange-glow)}
.btn-cyan{background:var(--cyan-soft);color:var(--cyan);border-color:var(--cyan)}
.btn-cyan:hover:not(:disabled){background:rgba(34,211,238,.2);box-shadow:0 0 18px var(--cyan-glow)}
.btn-ghost{background:transparent;border-color:var(--border-1);color:var(--text-2)}
.btn-ghost:hover:not(:disabled){color:var(--text-1);border-color:var(--border-2);background:var(--bg-2)}
.btn-danger{background:transparent;color:#f87171;border-color:#b91c1c}
.btn-danger:hover:not(:disabled){background:rgba(239,68,68,.1);color:#ef4444}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:540px){.field-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field-full{grid-column:1/-1}
.field label{font-family:var(--f-display);font-size:9px;letter-spacing:.16em;color:var(--text-3);text-transform:uppercase;font-weight:600}
.field input,.field select,.field textarea{background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:9px 11px;font-family:var(--f-mono);font-size:13px;outline:none;transition:border-color .15s,background .15s}
.field textarea{font-family:var(--f-body);resize:vertical;min-height:72px;line-height:1.6}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);background:var(--bg-1)}
.status-msg{padding:9px 12px;font-family:var(--f-mono);font-size:12px;border:1px solid var(--border-1);background:var(--bg-0);display:flex;align-items:center;gap:8px}
.status-msg.info{color:var(--cyan);border-color:var(--cyan);background:var(--cyan-soft)}
.status-msg.error{color:#f87171;border-color:#b91c1c;background:rgba(239,68,68,.08)}
.status-msg.success{color:#34d399;border-color:#047857;background:rgba(16,185,129,.08)}
.detail-grid{display:grid;grid-template-columns:130px 1fr;gap:10px;align-items:start}
@media(min-width:600px){.detail-grid{grid-template-columns:200px 1fr;gap:16px}}
.detail-img-wrap{background:#fff;border:1px solid var(--border-1);overflow:hidden;cursor:zoom-in;position:relative;transition:border-color .15s;padding:3px}
.detail-img-wrap.empty{cursor:pointer;border-style:dashed;background:#f4f6fa;padding:0}
.detail-img-wrap.empty:hover{border-color:var(--orange);background:#fff4ec}
.detail-img-wrap:hover{border-color:var(--cyan)}
.detail-img-wrap::after{content:"⤢";position:absolute;bottom:4px;right:4px;font-family:var(--f-mono);color:var(--text-1);background:rgba(0,0,0,.7);padding:2px 5px;font-size:10px;border:1px solid var(--border-2);opacity:0;transition:opacity .15s}
.detail-img-wrap:hover::after{opacity:1}
.detail-img{width:100%;aspect-ratio:5/7;object-fit:contain;display:block}
.detail-img-empty{width:100%;aspect-ratio:5/7;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-3);font-family:var(--f-mono);font-size:11px;letter-spacing:.16em;gap:8px}
.detail-img-empty::before{content:"⬆";font-size:36px;color:var(--orange);opacity:.7}
.detail-img-empty span{font-size:10px;letter-spacing:.2em;color:var(--text-2)}
.mc-img-section{margin-top:4px}
.mc-img-wrap{background:#fff;border:1px solid var(--border-1);overflow:hidden;cursor:zoom-in;position:relative;padding:3px;transition:border-color .15s}
.mc-img-wrap:hover{border-color:var(--cyan)}
.mc-img-clear{position:absolute;top:5px;right:5px;width:24px;height:24px;border:1px solid var(--border-2);background:rgba(0,0,0,.72);color:#fff;font-family:var(--f-mono);font-size:12px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;border-radius:2px}
.mc-img-clear:hover{background:var(--orange);border-color:var(--orange)}
.mc-img-drop{display:flex;align-items:center;justify-content:center;aspect-ratio:5/7;border:1px dashed var(--border-2);background:#f4f6fa;color:var(--text-2);font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;cursor:pointer;transition:all .15s;text-align:center;padding:8px}
.mc-img-drop:hover,.mc-img-drop.drag{border-color:var(--orange);background:#fff4ec;color:var(--orange)}
.detail-header{margin-bottom:8px}
.detail-category{font-family:var(--f-mono);font-size:9px;letter-spacing:.18em;color:var(--cyan);text-transform:uppercase;margin-bottom:2px}
.detail-name{font-family:var(--f-body);font-weight:900;font-size:16px;line-height:1.2;color:var(--text-1)}
@media(min-width:600px){.detail-name{font-size:20px}}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(54px,1fr));gap:4px;margin-bottom:8px}
.stat{background:var(--bg-0);border-left:2px solid var(--cyan);padding:4px 6px;min-width:0;overflow:hidden}
.stat-label{font-family:var(--f-mono);font-size:8px;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase}
.stat-value{font-family:var(--f-display);font-weight:700;font-size:13px;color:var(--text-1);margin-top:1px;word-break:break-word}
@media(min-width:600px){.stat{padding:6px 9px}.stat-label{font-size:9px}.stat-value{font-size:16px}}
.detail-text-block{background:var(--bg-0);border:1px solid var(--border-1);padding:7px 9px;margin-bottom:6px;white-space:pre-wrap;font-size:11px;line-height:1.55;color:var(--text-1)}
.detail-text-label{font-family:var(--f-display);font-size:9px;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;margin-bottom:3px;font-weight:600}
@media(min-width:600px){.detail-text-block{padding:10px 12px;font-size:13px;line-height:1.7}.detail-text-label{font-size:10px}}
.trait-tactical{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:5px 9px;background:var(--bg-0);border-left:2px solid var(--cyan);margin-bottom:6px}
.trait-tactical-label{font-family:var(--f-display);font-size:9px;color:var(--text-3);letter-spacing:.14em;font-weight:700;text-transform:uppercase}
.trait-type-chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--f-display);font-size:10px;padding:2px 7px;background:var(--bg-2);border:1px solid var(--type-c,var(--text-3));color:var(--type-c,var(--text-3));font-weight:600}
.trait-type-chip::before{content:"";width:5px;height:5px;background:var(--type-c,currentColor);box-shadow:0 0 4px var(--type-c,currentColor)}
.trait-action{background:var(--bg-0);border:1px solid var(--border-1);margin-bottom:5px;clip-path:var(--clip-sm)}
.trait-action.is-passive{border-color:rgba(16,185,129,.5)}
.trait-action-head{display:flex;align-items:center;gap:7px;padding:5px 9px;border-bottom:1px solid var(--border-1);background:var(--bg-2)}
.trait-action.is-passive .trait-action-head{border-bottom-color:rgba(16,185,129,.35)}
.trait-kind{font-family:var(--f-display);font-weight:700;font-size:9px;letter-spacing:.1em;padding:2px 7px;min-width:34px;text-align:center;line-height:1.3;text-transform:uppercase;border:1px solid currentColor}
.trait-kind.kind-action{color:var(--orange);background:rgba(255,107,26,.1)}
.trait-kind.kind-passive{color:#10b981;background:rgba(16,185,129,.12)}
.variant-tabs{display:flex;gap:5px;margin:4px 0 8px}
.variant-tab{font-family:var(--f-display);font-weight:700;font-size:10px;letter-spacing:.03em;padding:6px 10px;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-2);cursor:pointer;transition:all .15s;clip-path:var(--clip-sm);white-space:nowrap}
.variant-tab:hover{color:var(--text-1);background:var(--bg-2)}
.variant-tab.active{background:var(--orange-soft);border-color:var(--orange);color:var(--orange);box-shadow:0 0 12px rgba(255,107,26,.18)}
.variant-tab .vt-greek{font-family:var(--f-mono);font-size:11px;margin-left:3px;opacity:.85}
@media(min-width:540px){.variant-tab{font-size:11px;padding:7px 14px}.variant-tab .vt-greek{font-size:12px}}
.var-img-row{display:flex;gap:10px;align-items:flex-start;margin-top:8px}
.var-dropzone{flex:0 0 90px;border:1px dashed var(--border-2);background:var(--bg-0);padding:8px 4px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;clip-path:var(--clip-sm)}
.var-dropzone:hover,.var-dropzone.dragover{border-color:var(--orange);background:var(--orange-soft)}
.var-dropzone-icon{font-family:var(--f-mono);font-size:16px;color:var(--orange);opacity:.8}
.var-dropzone-text{font-family:var(--f-mono);font-size:8px;color:var(--text-3);margin-top:3px;letter-spacing:.04em}
.var-dropzone input{display:none}
.var-img-preview{flex:0 0 64px;height:90px;background:#fff;border:1px solid var(--border-1);object-fit:contain;display:none}
.var-img-preview.show{display:block}
.var-img-clear{font-family:var(--f-mono);font-size:9px;color:var(--text-3);border:1px solid var(--border-1);background:transparent;padding:3px 8px;cursor:pointer;transition:all .15s}
.var-img-clear:hover{color:#f87171;border-color:#b91c1c}
.trait-cost{font-family:var(--f-mono);font-weight:700;font-size:11px;color:var(--orange);background:var(--bg-0);border:1px solid var(--orange);padding:1px 6px;min-width:22px;text-align:center;line-height:1}
.trait-name{font-family:var(--f-body);font-weight:700;font-size:12px;color:var(--text-1)}
.trait-mode{font-family:var(--f-mono);font-size:9px;color:var(--text-3);margin-left:auto;padding:1px 5px;border:1px solid var(--border-1);letter-spacing:.04em}
.trait-effect{padding:6px 9px;font-size:11px;line-height:1.55;color:var(--text-1);white-space:pre-wrap}
@media(min-width:540px){.trait-tactical{padding:8px 12px;gap:8px}.trait-tactical-label{font-size:10px}.trait-type-chip{font-size:11px;padding:3px 9px}.trait-action-head{padding:8px 12px;gap:10px}.trait-cost{font-size:13px;padding:3px 9px;min-width:28px}.trait-name{font-size:14px}.trait-effect{padding:10px 12px;font-size:13px;line-height:1.7}.trait-kind{font-size:10px;padding:3px 9px;min-width:40px}}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox-img{max-width:95vw;max-height:92vh;object-fit:contain;box-shadow:0 24px 64px rgba(0,0,0,.8);border:1px solid var(--border-2)}
.lightbox-close{position:absolute;top:16px;right:16px;background:var(--bg-1);border:1px solid var(--border-2);color:var(--text-1);width:40px;height:40px;font-size:16px;cursor:pointer;font-family:var(--f-mono)}
.lightbox-close:hover{color:var(--orange);border-color:var(--orange)}
.import-options{display:flex;gap:8px;flex-wrap:wrap}
.import-radio{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border:1px solid var(--border-1);background:var(--bg-0);cursor:pointer;flex:1;min-width:160px;transition:border-color .15s,background .15s}
.import-radio:hover{border-color:var(--border-2)}
.import-radio input{accent-color:var(--orange);margin-top:2px}
.import-radio.selected{border-color:var(--orange);background:var(--orange-soft)}
.import-radio-label{font-family:var(--f-display);font-size:12px;font-weight:600;letter-spacing:.04em}
.import-radio-desc{display:block;font-family:var(--f-mono);font-size:10px;color:var(--text-3);margin-top:2px;font-weight:400}
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:250;pointer-events:none;align-items:center;width:calc(100% - 20px);max-width:500px}
.toast{background:var(--bg-2);border:1px solid var(--border-2);padding:10px 16px;font-family:var(--f-mono);font-size:12px;color:var(--text-1);box-shadow:var(--sh-2);transform:translateY(20px);opacity:0;transition:transform .25s cubic-bezier(.2,.8,.2,1),opacity .25s;pointer-events:auto;clip-path:var(--clip-sm);max-width:100%}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{border-left:3px solid #10b981}
.toast-error{border-left:3px solid #ef4444}
.toast-info{border-left:3px solid var(--cyan)}
@media(min-width:720px){#toasts{bottom:28px}.toast{font-size:13px}}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-bottom-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:var(--border-2)}
::-webkit-scrollbar-thumb:hover{background:var(--orange)}
.skeleton{background:linear-gradient(90deg,var(--bg-1) 0%,var(--bg-2) 50%,var(--bg-1) 100%);background-size:200% 100%;animation:skel 1.4s ease-in-out infinite}
@keyframes skel{to{background-position:-200% 0}}
@media(max-width:540px){.modal-body{padding:14px}.preview-row{gap:8px}.stat-row{grid-template-columns:repeat(auto-fit,minmax(70px,1fr))}.adv-filters{gap:10px;padding:10px}.range-inputs input{width:48px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">MEDAROT RB</div>
      <div class="brand-sub">CARD DATABASE</div>
    </div>
    <div class="header-tools">
      <div class="cloud-indicator" id="cloudIndicator" title="Supabase 接続中">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
      </div>
      <button class="icon-btn" id="importBtn" title="JSONインポート" aria-label="インポート">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" id="exportBtn" title="JSONエクスポート" aria-label="エクスポート">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <div class="stat-pill">TOTAL <b id="totalCount">0</b></div>
    </div>
  </div>
</header>

<main class="app">
  <div class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </div>

  <details class="search-collapse" id="searchCollapse">
    <summary class="search-toggle">
      <span class="search-toggle-icon">🔍</span>
      <span class="search-toggle-label">検索 / フィルタ</span>
      <span class="search-toggle-state" id="searchFilterCount"></span>
      <span class="search-toggle-arrow">▾</span>
    </summary>

    <div class="filters">
      <div class="search-wrap">
        <input id="search" class="search" type="text" placeholder="CARD NAME / EFFECT TEXT" autocomplete="off" spellcheck="false">
      </div>
      <div class="filter-controls">
        <div class="type-chips" id="typeChips"></div>
      </div>
    </div>

    <div class="adv-filters">
      <div class="range-group">
        <div class="range-group-label">行動コスト</div>
        <div class="range-inputs">
          <input type="number" id="costMin" placeholder="min" min="0">
          <span>–</span>
          <input type="number" id="costMax" placeholder="max" min="0">
        </div>
      </div>
      <div class="range-group">
        <div class="range-group-label">BP</div>
        <div class="range-inputs">
          <input type="number" id="bpMin" placeholder="min" min="0">
          <span>–</span>
          <input type="number" id="bpMax" placeholder="max" min="0">
        </div>
      </div>
      <div class="range-group" id="legGroup" style="display:none;">
        <div class="range-group-label">脚部タイプ</div>
        <div class="range-inputs">
          <input type="text" id="legFilter" placeholder="二脚 / 多脚 / 飛行...">
        </div>
      </div>
      <div class="range-group" id="partsArmGroup" style="display:none;">
        <div class="range-group-label">パーツ腕</div>
        <select id="partsArmFilter" class="sort-select">
          <option value="">指定なし</option>
          <option value="L">L腕</option>
          <option value="R">R腕</option>
        </select>
      </div>
      <div class="range-group" id="partsModeGroup" style="display:none;">
        <div class="range-group-label">パーツモード</div>
        <select id="partsModeFilter" class="sort-select">
          <option value="">指定なし</option>
          <option value="行動">行動</option>
          <option value="戦術">戦術</option>
        </select>
      </div>
      <div class="range-group">
        <div class="range-group-label">並び替え</div>
        <select id="sortSelect" class="sort-select">
          <option value="updated-desc">追加日(新しい順)</option>
          <option value="updated-asc">追加日(古い順)</option>
          <option value="name-asc">名前(A→Z)</option>
          <option value="name-desc">名前(Z→A)</option>
          <option value="cost-asc">コスト(低→高)</option>
          <option value="cost-desc">コスト(高→低)</option>
          <option value="bp-asc">BP(低→高)</option>
          <option value="bp-desc">BP(高→低)</option>
        </select>
      </div>
      <div class="spacer"></div>
      <button class="clear-btn" id="clearFilters">CLEAR ALL</button>
    </div>
  </details>

  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <div class="empty-icon">◇ ◇ ◇</div>
    <div class="empty-title">NO CARDS FOUND</div>
    <div class="empty-sub">右下の <b>＋</b> から最初のカードを追加するか、検索条件を変更してください</div>
  </div>
</main>

<button class="fab" id="fabAdd" title="新規カード追加" aria-label="新規カード">＋</button>

<div class="modal-overlay" id="uploadModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="uploadTitle">NEW CARD</div>
      <div class="queue-badge" id="queueBadge" style="display:none;"></div>
      <button class="modal-close" id="uploadClose" aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body">
      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="dropzone-icon">⬆</div>
        <div class="dropzone-text">画像をドロップ / クリックで選択</div>
        <div class="dropzone-hint">枠を自動検出してトリミング(複数選択可)</div>
      </label>

      <div class="preview-row" id="previewRow" style="display:none;">
        <div class="preview-block">
          <div class="preview-label">ORIGINAL <small id="origSize"></small></div>
          <img id="origPreview" class="preview-img" alt="">
        </div>
        <div class="preview-block">
          <div class="preview-label">CROPPED <small id="trimSize"></small></div>
          <img id="trimPreview" class="preview-img" alt="">
        </div>
      </div>

      <div id="cropControlsWrap" class="crop-controls" style="display:none;">
        <div class="crop-status" id="cropStatus">
          <span class="crop-status-dot"></span>
          <span id="cropStatusText">処理中...</span>
        </div>
        <button type="button" class="rotate-btn" id="rotateBtn" title="90°回転(時計回り)" aria-label="回転">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <label class="toggle">
          <input type="checkbox" id="useOriginalToggle">
          <span class="toggle-track"></span>
          <span>クロップなし</span>
        </label>
      </div>

      <div class="row-actions" id="imageActions" style="display:none;">
        <div class="spacer"></div>
        <button class="btn btn-ghost" id="removeImageBtn">画像を削除</button>
      </div>

      <div id="statusMsg" class="status-msg info" style="display:none;"></div>

      <div class="field-grid">
        <div class="field field-full">
          <label>カード種別</label>
          <select id="f_cardType">
            <option value="leader_medarot">リーダーメダロット</option>
            <option value="support_medarot">サポートメダロット</option>
            <option value="parts_card">パーツカード</option>
            <option value="medaforce_card">メダフォースカード</option>
            <option value="support_card">サポートカード</option>
            <option value="tactical_card">戦術カード</option>
            <option value="cheer_card">応援カード</option>
          </select>
        </div>
        <div class="field field-full">
          <label>カード名</label>
          <input type="text" id="f_name" placeholder="メダロット名 / カード名">
        </div>
        <div class="field" id="wrap_elementType">
          <label>タイプ</label>
          <select id="f_elementType">
            <option value="">—</option>
            <option value="格闘">格闘</option>
            <option value="射撃">射撃</option>
            <option value="支援">支援</option>
            <option value="設置">設置</option>

  const ext = mime.split('/')[1].replace('jpeg', 'jpg').replace('+xml', '');

  const blob = new Blob([bytes], { type: mime });
  const path = 'cards/' + cardId + '-' + Date.now() + '.' + ext;
  const url = SUPABASE_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + path;
  const resp = await fetch(url, {

/* AUTO CARD-EDGE DETECTION (center-out expansion)
   1. Sample background color from many edge points (median for robustness)
   2. Verify center is card-like
   3. From center, expand outward along each axis until the row/col
      crosses below the card-content threshold = boundary
   4. Validate and scale back to original dimensions */
async function detectCardBounds(originalDataUrl) {
  const img = await loadImage(originalDataUrl);
  const w = img.naturalWidth, h = img.naturalHeight;

  // Downsample for analysis speed
  const ANALYSIS_MAX = 480;
  const scale = Math.min(1, ANALYSIS_MAX / Math.max(w, h));
  const aw = Math.max(4, Math.round(w * scale));
  const ah = Math.max(4, Math.round(h * scale));
  const canvas = document.createElement('canvas');
  canvas.width = aw; canvas.height = ah;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0, aw, ah);
  const data = ctx.getImageData(0, 0, aw, ah).data;

  function getRGB(x, y) {
    const i = (y * aw + x) * 4;
    return [data[i], data[i + 1], data[i + 2]];
  }
  const median = (arr) => {
    const s = arr.slice().sort((a, b) => a - b);
    return s[Math.floor(s.length / 2)];
  };

  // Background = median of many edge samples (1px inset to skip edge artifacts)
  const edgeSamples = [];
  const inset = 1;
  const step = Math.max(1, Math.floor(Math.min(aw, ah) / 40));
  for (let x = 0; x < aw; x += step) {
    edgeSamples.push(getRGB(x, inset));
    edgeSamples.push(getRGB(x, ah - 1 - inset));
  }
  for (let y = 0; y < ah; y += step) {
    edgeSamples.push(getRGB(inset, y));
    edgeSamples.push(getRGB(aw - 1 - inset, y));
  }
  const bgR = median(edgeSamples.map(c => c[0]));
  const bgG = median(edgeSamples.map(c => c[1]));
  const bgB = median(edgeSamples.map(c => c[2]));

  const THRESH = 32;
  const thresh2 = THRESH * THRESH;
  function isCard(x, y) {
    const i = (y * aw + x) * 4;
    const dr = data[i] - bgR, dg = data[i + 1] - bgG, db = data[i + 2] - bgB;
    return (dr * dr + dg * dg + db * db) > thresh2;
  }

  const cx = Math.floor(aw / 2);
  const cy = Math.floor(ah / 2);

  // Sanity check: center area should be predominantly card
  let centerCard = 0, centerTotal = 0;
  const ch = Math.max(3, Math.floor(Math.min(aw, ah) * 0.04));
  for (let y = Math.max(0, cy - ch); y <= Math.min(ah - 1, cy + ch); y++) {
    for (let x = Math.max(0, cx - ch); x <= Math.min(aw - 1, cx + ch); x++) {
      if (isCard(x, y)) centerCard++;
      centerTotal++;
    }
  }
  if (centerCard / centerTotal < 0.5) {
    // Center isn't reliably card content
    return { detected: false, almostFull: false, x: 0, y: 0, w, h, ratio: 1 };
  }

  // Compute "card-ness" for every row/column over the FULL width/height
  // (full extent — not a narrow center slice — so dark card details
  // don't appear as gaps when they happen to align with the center axis).
  const rowRatios = new Array(ah);
  const colRatios = new Array(aw);
  for (let y = 0; y < ah; y++) {
    let c = 0;
    for (let x = 0; x < aw; x++) if (isCard(x, y)) c++;
    rowRatios[y] = c / aw;
  }
  for (let x = 0; x < aw; x++) {
    let c = 0;
    for (let y = 0; y < ah; y++) if (isCard(x, y)) c++;
    colRatios[x] = c / ah;
  }

  // Max-window dilation to bridge tiny internal gaps
  function dilate(arr, win) {
    const half = (win || 5) >> 1;
    const out = new Array(arr.length);
    for (let i = 0; i < arr.length; i++) {
      let mx = 0;
      const s = Math.max(0, i - half);
      const e = Math.min(arr.length, i + half + 1);
      for (let j = s; j < e; j++) if (arr[j] > mx) mx = arr[j];
      out[i] = mx;
    }
    return out;
  }
  const rowSm = dilate(rowRatios, 5);
  const colSm = dilate(colRatios, 5);

  // Longest contiguous run of rows/cols above CARD_THRESHOLD.
  // This picks the dominant subject even when stray UI strips
  // (text bars, icon rows, side arrows) also exceed the threshold,
  // because they are short while the card is long.
  const CARD_THRESHOLD = 0.18;
  function longestRun(arr, thr) {
    let bs = -1, bl = 0, cs = -1;
    for (let i = 0; i < arr.length; i++) {
      if (arr[i] >= thr) {
        if (cs < 0) cs = i;
      } else if (cs >= 0) {
        const len = i - cs;
        if (len > bl) { bs = cs; bl = len; }
        cs = -1;
      }
    }
    if (cs >= 0 && arr.length - cs > bl) { bs = cs; bl = arr.length - cs; }
    return [bs, bs + bl - 1];
  }
  const initial = longestRun(rowSm, CARD_THRESHOLD);
  const initialH = longestRun(colSm, CARD_THRESHOLD);
  let top = initial[0], bottom = initial[1];
  let left = initialH[0], right = initialH[1];

  // Validation: must be reasonably large
  if (top < 0 || left < 0 ||
      right - left < aw * 0.2 || bottom - top < ah * 0.2) {
    return { detected: false, almostFull: false, x: 0, y: 0, w, h, ratio: 1 };
  }

  // === Stage 2: loose expansion (capture glow / halo around card) ===
  // Use a much lower color threshold to detect the faded outer edges
  // of the glow. Restrict the scan range to avoid being pulled into
  // adjacent UI / faded sibling cards.
  const LOOSE_THRESH = 18;
  const loose2 = LOOSE_THRESH * LOOSE_THRESH;
  const LOOSE_MIN = 0.08;
  function looseRowRatio(y, x0, x1) {
    let c = 0;
    for (let x = x0; x <= x1; x++) {
      const i = (y * aw + x) * 4;
      const dr = data[i] - bgR, dg = data[i + 1] - bgG, db = data[i + 2] - bgB;
      if (dr * dr + dg * dg + db * db > loose2) c++;
    }
    return c / (x1 - x0 + 1);
  }
  function looseColRatio(x, y0, y1) {
    let c = 0;
    for (let y = y0; y <= y1; y++) {
      const i = (y * aw + x) * 4;
      const dr = data[i] - bgR, dg = data[i + 1] - bgG, db = data[i + 2] - bgB;
      if (dr * dr + dg * dg + db * db > loose2) c++;
    }
    return c / (y1 - y0 + 1);
  }

  const origTop = top, origBottom = bottom;
  const MAX_EXP_V = Math.max(4, Math.floor((bottom - top + 1) * 0.18));
  for (let i = 0; i < MAX_EXP_V && top > 0; i++) {
    if (looseRowRatio(top - 1, left, right) > LOOSE_MIN) top--; else break;
  }
  for (let i = 0; i < MAX_EXP_V && bottom < ah - 1; i++) {
    if (looseRowRatio(bottom + 1, left, right) > LOOSE_MIN) bottom++; else break;
  }
  const MAX_EXP_H = Math.max(4, Math.floor((right - left + 1) * 0.08));
  for (let i = 0; i < MAX_EXP_H && left > 0; i++) {
    if (looseColRatio(left - 1, origTop, origBottom) > LOOSE_MIN) left--; else break;
  }
  for (let i = 0; i < MAX_EXP_H && right < aw - 1; i++) {
    if (looseColRatio(right + 1, origTop, origBottom) > LOOSE_MIN) right++; else break;
  }

  const sx = Math.max(0, Math.round(left / scale));
  const sy = Math.max(0, Math.round(top / scale));
  const sw = Math.min(w - sx, Math.round((right - left + 1) / scale));
  const sh = Math.min(h - sy, Math.round((bottom - top + 1) / scale));
  const areaRatio = (sw * sh) / (w * h);

  return {
    detected: areaRatio < 0.97,
    almostFull: areaRatio >= 0.97,
    x: sx, y: sy, w: sw, h: sh,
    ratio: areaRatio,
    bgR: bgR, bgG: bgG, bgB: bgB,
  };
}

async function cropAndResize(originalDataUrl, bounds, useOriginal, maxSide = 1200) {
  const img = await loadImage(originalDataUrl);
  const W = img.naturalWidth, H = img.naturalHeight;
  let sx = 0, sy = 0, sw = W, sh = H;
  if (!useOriginal && bounds && bounds.detected) {
    sx = bounds.x; sy = bounds.y; sw = bounds.w; sh = bounds.h;
  }
  const ratio = Math.min(1, maxSide / Math.max(sw, sh));
  const dw = Math.max(1, Math.round(sw * ratio));
  const dh = Math.max(1, Math.round(sh * ratio));
  const canvas = document.createElement('canvas');
  canvas.width = dw; canvas.height = dh;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, dw, dh);

  // Replace background with white using detected bg color (flood-fill).
  if (bounds && typeof bounds.bgR === 'number') {
    whitenBackground(ctx, dw, dh, bounds.bgR, bounds.bgG, bounds.bgB);
  }

  return {
    dataUrl: canvas.toDataURL('image/jpeg', 0.9),
    origDims: { w: W, h: H },
    outDims: { w: dw, h: dh },
  };
}

function whitenBackground(ctx, w, h, bgR, bgG, bgB) {
  // Flood-fill based: any pixel reachable from the image edges via
  // "background-like" pixels becomes white. This guarantees that
  // pixels enclosed by the card body (e.g. blue card icons) are
  // preserved, even if their color is similar to the background.
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const total = w * h;
  // Mark mask: 0 = unknown, 1 = background (will whiten),
  //            2 = visited but not background (queued blocker, skip)
  const mask = new Uint8Array(total);

  // Pixel is "background-like" if RGB distance from detected bg < THRESH.
  // Use a generous threshold so faded UI / siblings (which sit on the
  // same dark bg) are captured.
  const THRESH = 70;
  const thresh2 = THRESH * THRESH;
  function isBgLike(idx) {
    const dr = data[idx] - bgR;
    const dg = data[idx + 1] - bgG;
    const db = data[idx + 2] - bgB;
    return (dr * dr + dg * dg + db * db) < thresh2;
  }

  // BFS queue (typed array index queue)
  const queue = new Int32Array(total);
  let qHead = 0, qTail = 0;
  function enqueue(x, y) {
    if (x < 0 || y < 0 || x >= w || y >= h) return;
    const pos = y * w + x;
    if (mask[pos] !== 0) return;
    if (isBgLike(pos * 4)) {
      mask[pos] = 1;
      queue[qTail++] = pos;
    } else {
      mask[pos] = 2; // blocker — leave the pixel as-is
    }
  }
  // Seed from all 4 edges
  for (let x = 0; x < w; x++) { enqueue(x, 0); enqueue(x, h - 1); }
  for (let y = 0; y < h; y++) { enqueue(0, y); enqueue(w - 1, y); }
  // BFS
  while (qHead < qTail) {
    const p = queue[qHead++];
    const x = p % w, y = (p / w) | 0;
    if (x > 0)     enqueue(x - 1, y);
    if (x < w - 1) enqueue(x + 1, y);
    if (y > 0)     enqueue(x, y - 1);
    if (y < h - 1) enqueue(x, y + 1);
  }
  // Whiten all reachable background pixels
  for (let p = 0; p < total; p++) {
    if (mask[p] === 1) {
      const i = p * 4;
      data[i] = 255; data[i + 1] = 255; data[i + 2] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}


function applyFilters() {
  const q = state.search.trim().toLowerCase();
  return state.cards.filter(c => {
    if (state.activeTab !== 'all' && c.cardType !== state.activeTab) return false;
    if (state.elementType && c.elementType !== state.elementType) return false;
    if (state.bpMin !== '' && (c.bp == null || c.bp < +state.bpMin)) return false;
    if (state.bpMax !== '' && (c.bp == null || c.bp > +state.bpMax)) return false;
    if (state.costMin !== '' && (c.actionCost == null || c.actionCost < +state.costMin)) return false;
    if (state.costMax !== '' && (c.actionCost == null || c.actionCost > +state.costMax)) return false;
    if (state.legFilter) {
      const lf = state.legFilter.trim().toLowerCase();
      if (!c.legType || !c.legType.toLowerCase().includes(lf)) return false;
    }
    if (state.partsArmFilter && c.partsArm !== state.partsArmFilter) return false;
    if (state.partsModeFilter && c.partsMode !== state.partsModeFilter) return false;
    if (q) {
      const hay = [c.name, c.traits, c.effectText, c.notes, c.legType].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}
function sortCards(arr) {
  const sorted = arr.slice();
  const cmpN = (a, b) => (a == null ? Infinity : a) - (b == null ? Infinity : b);
  const cmpNDesc = (a, b) => (b == null ? -Infinity : b) - (a == null ? -Infinity : a);
  const collator = new Intl.Collator('ja');
  switch (state.sortBy) {
    case 'name-asc':  sorted.sort((a, b) => collator.compare(a.name || '', b.name || '')); break;
    case 'name-desc': sorted.sort((a, b) => collator.compare(b.name || '', a.name || '')); break;
    case 'bp-asc':    sorted.sort((a, b) => cmpN(a.bp, b.bp)); break;
    case 'bp-desc':   sorted.sort((a, b) => cmpNDesc(a.bp, b.bp)); break;
    case 'cost-asc':  sorted.sort((a, b) => cmpN(a.actionCost, b.actionCost)); break;
    case 'cost-desc': sorted.sort((a, b) => cmpNDesc(a.actionCost, b.actionCost)); break;
    case 'updated-asc':  sorted.sort((a, b) => (a.updatedAt || 0) - (b.updatedAt || 0)); break;
    default: sorted.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)); break;
  }
  return sorted;
}

/* Parse + render a structured traits text block.
   Recognized lines:
     "戦術: 射撃, 射撃"           → tactical type chips
     "[<cost>] <name>(行動|戦術)"  → action header
     "<text>"                     → action effect body (continuation)
   Falls back to a single text block if no structured tokens found. */
function renderTraits(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let any = false;
  let buffer = null;
  const out = [];
  const flush = () => {
    if (!buffer) return;
    const isPassive = buffer.kind === 'passive';
    const kindLabel = isPassive ? '特性' : '行動';
    const kindClass = isPassive ? 'kind-passive' : 'kind-action';
    const costHtml = (buffer.cost != null && buffer.cost !== '')
      ? '<span class="trait-cost">' + escapeHtml(String(buffer.cost)) + '</span>' : '';
    out.push(
      '<div class="trait-action' + (isPassive ? ' is-passive' : '') + '">' +
        '<div class="trait-action-head">' +
          '<span class="trait-kind ' + kindClass + '">' + kindLabel + '</span>' +
          costHtml +
          '<span class="trait-name">' + escapeHtml(buffer.name) + '</span>' +
          (buffer.mode ? '<span class="trait-mode">' + escapeHtml(buffer.mode) + '</span>' : '') +
        '</div>' +
        (buffer.effect.trim() ? '<div class="trait-effect">' + escapeHtml(buffer.effect.trim()) + '</div>' : '') +
      '</div>'
    );
    buffer = null;
  };
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { continue; }
    // Tactical line: "戦術:[設置][設置]" or "戦術: 射撃, 射撃"
    const tm = /^戦術\s*[:：]\s*(.+)$/.exec(line);
    if (tm) {
      flush();
      any = true;
      const types = tm[1].split(/[,、\s]+|\]\s*\[|[\[\]]/).map(s => s.trim()).filter(Boolean);
      out.push(
        '<div class="trait-tactical">' +
        '<span class="trait-tactical-label">戦術</span>' +
        types.map(t => {
          const c = ELEMENT_COLORS[t] || 'var(--text-3)';
          return '<span class="trait-type-chip" style="--type-c:' + c + '">' + escapeHtml(t) + '</span>';
        }).join('') +
        '</div>'
      );
      continue;
    }
    // New structured form: "【行動】<name>(<cost>)：<effect>" or "【特性】<name>：<effect>"
    const km = /^【\s*(行動|特性)\s*】\s*(.+)$/.exec(line);
    if (km) {
      flush();
      any = true;
      const kind = km[1] === '特性' ? 'passive' : 'action';
      let rest = km[2].trim();
      let cost = null, name = rest, effect = '';
      // Split name vs effect on the first fullwidth/halfwidth colon
      const colonIdx = rest.search(/[:：]/);
      if (colonIdx >= 0) {
        name = rest.slice(0, colonIdx).trim();
        effect = rest.slice(colonIdx + 1).trim();
      }
      // Extract trailing "(N)" cost from the name part (actions only)
      const cm = /^(.*?)\s*[（(]\s*(\d+)\s*[）)]\s*$/.exec(name);
      if (cm) { name = cm[1].trim(); cost = cm[2]; }
      buffer = { kind: kind, cost: cost, name: name, mode: '', effect: effect };
      continue;
    }
    // Legacy action header: "[N] name(行動|戦術)"
    const am = /^\[(\d+)\]\s*(.+?)(?:\s*[（(](行動|戦術)[）)])?\s*$/.exec(line);
    if (am) {
      flush();
      any = true;
      buffer = { kind: 'action', cost: am[1], name: am[2], mode: am[3] || '', effect: '' };
      continue;
    }
    // Continuation / freeform
    if (buffer) {
      buffer.effect += (buffer.effect ? '\n' : '') + line;
    } else {
      out.push('<div class="detail-text-block">' + escapeHtml(line) + '</div>');
    }
  }
  flush();
  if (!any) {
    return '<div class="detail-text-block">' + escapeHtml(text) + '</div>';
  }
  return out.join('');
}

function openDetail(id) {
  const c = state.cards.find(x => x.id === id);
  if (!c) return;
  const cat = CARD_CATEGORIES[c.cardType] || { label: '—' };
  // Build the ordered list of views (base first, then variants) up front so
  // both the stat row and the variant section can use per-variant overrides.
  const tierOrder = { base: 0, alpha: 1, beta: 2, drive_a: 3, drive_b: 4 };
  const greek = { base: '', alpha: 'α', beta: 'β', drive_a: 'A', drive_b: 'B' };
  const vs = Array.isArray(c.variants) ? c.variants : [];
  const views = [];
  if (c.traits) views.push({
    key: 'base', label: '基本', greek: '', traits: c.traits,
    actionCost: c.actionCost, image: c.image || null,
    elementType: c.elementType, partsMode: c.partsMode, barrierLimit: c.barrierLimit,
  });
  vs.slice().sort((a, b) => (tierOrder[a.tier] != null ? tierOrder[a.tier] : 9) - (tierOrder[b.tier] != null ? tierOrder[b.tier] : 9))
    .forEach(v => views.push({
      key: v.tier,
      label: v.label || (v.tier === 'alpha' ? '強化' : v.tier === 'beta' ? '強化'
        : v.tier === 'drive_a' ? 'ドライブ' : v.tier === 'drive_b' ? 'ドライブ' : v.tier),
      greek: greek[v.tier] != null ? greek[v.tier] : '',
      traits: v.traits != null ? v.traits : c.traits,
      actionCost: v.actionCost != null ? v.actionCost : c.actionCost,
      image: v.image || c.image || null,
      // Per-variant overrides; fall back to the base card when absent.
      elementType: (v.elementType != null && v.elementType !== '') ? v.elementType : c.elementType,
      partsMode: (v.partsMode != null && v.partsMode !== '') ? v.partsMode : c.partsMode,
      barrierLimit: (v.barrierLimit != null && v.barrierLimit !== '') ? v.barrierLimit : c.barrierLimit,
      bonusValue: (v.bonusValue != null && v.bonusValue !== '') ? v.bonusValue : c.bonusValue,
    }));

  // Compute the stat row for a given view (overrides win, base is fallback).
  // For parts cards the 腕 column is shown before TYPE (per UI request).
  function statsFor(view) {
    const g = (k) => (view && view[k] != null && view[k] !== '') ? view[k] : c[k];
    const elementType = g('elementType');
    const partsMode = g('partsMode');

    const typeStat = elementType ? { l: 'TYPE', v: elementType, color: tc } : null;
    const lead = isParts ? [armStat, typeStat] : [typeStat, armStat];
    const stats = lead.concat([
      partsMode ? { l: 'モード', v: partsMode, color: 'var(--cyan)' } : null,
      (actionCost != null && actionCost !== '') ? { l: '行動コスト', v: actionCost, color: 'var(--orange)' } : null,
      (bonusValue != null && bonusValue !== '') ? { l: 'ボーナス', v: '+' + bonusValue, color: 'var(--orange)' } : null,
      (barrierLimit != null && barrierLimit !== '') ? { l: 'バリアリミット', v: barrierLimit, color: 'var(--cyan)' } : null,
      (c.bp != null && c.bp !== '') ? { l: 'BP', v: c.bp } : null,
      (c.coolingCost != null && c.coolingCost !== '') ? { l: '冷却コスト', v: c.coolingCost } : null,
      c.legType ? { l: '脚部', v: c.legType } : null,
    ]).filter(Boolean);
    const html = stats.map(s =>
      '<div class="stat"' + (s.color ? ' style="border-left-color:' + s.color + '"' : '') + '>' +
      '<div class="stat-label">' + s.l + '</div>' +
      '<div class="stat-value"' + (s.color ? ' style="color:' + s.color + '"' : '') + '>' +
      escapeHtml(String(s.v)) + '</div></div>'
    ).join('');
    return { tc: tc, html: html };
  }
  const __initialStats = statsFor(views.length ? views[0] : null);
  const typeColor = __initialStats.tc;
  const statsHtml = __initialStats.html;

  // メダチェンジ後画像: リーダーメダロット かつ drive_a/drive_b 保有時のみ。
  // drive_a/drive_b 両 variant の image を共通1枚として扱う。
  const isMedaChangeLeader = (c.cardType === 'leader_medarot') &&
    Array.isArray(c.variants) &&
    c.variants.some(v => v && (v.tier === 'drive_a' || v.tier === 'drive_b'));
  const mcImg = isMedaChangeLeader ? (function() {
    const dv = c.variants.find(v => v && (v.tier === 'drive_a' || v.tier === 'drive_b') &&
      v.image && String(v.image).trim() !== '');
    return dv ? dv.image : null;
  })() : null;
  const medaChangeSection = isMedaChangeLeader ? (
    '<div class="mc-img-section">' +
      '<div class="detail-text-label" style="margin-top:10px;">メダチェンジ後画像</div>' +
      (mcImg
        ? '<div class="mc-img-wrap" id="mcImgWrap"><img class="detail-img" src="' + mcImg + '" alt="メダチェンジ後">' +
          '<button class="mc-img-clear" id="mcImgClear" title="削除">✕</button></div>'
        : '<label class="mc-img-drop" id="mcImgDrop"><input type="file" id="mcImgFile" accept="image/*" hidden>' +
          '<span>＋ メダチェンジ後画像を追加</span></label>') +
    '</div>'
  ) : '';

  document.getElementById('detailBody').innerHTML =
    '<div class="detail-grid">' +
    '<div>' +
    '<div class="detail-img-wrap' + (c.image ? '' : ' empty') + '" id="detailImgWrap">' +
      (c.image ? '<img class="detail-img" src="' + c.image + '" alt="' + escapeAttr(c.name || '') + '">'
               : '<div class="detail-img-empty"><span>画像を追加</span></div>') +
    '</div>' +
    medaChangeSection +

// Collect α/β variant data from the editor form.
// If a variant's traits field is empty, fall back to the existing card's
// variant data so editing/saving the base card never wipes α/β.
function collectVariantsFromForm(existing) {
  const existingVariants = (existing && Array.isArray(existing.variants)) ? existing.variants : [];
  const findExisting = (tier) => existingVariants.find(v => v && v.tier === tier) || null;
  const out = [];
  ['alpha', 'beta'].forEach(tier => {
    const traitsEl = document.getElementById('f_var_' + tier + '_traits');
    const costEl = document.getElementById('f_var_' + tier + '_cost');
    const ex = findExisting(tier);
    // If the form fields don't exist (non-parts card) keep existing as-is
    if (!traitsEl) { if (ex) out.push(ex); return; }
    const traits = traitsEl.value.trim();
    const costRaw = costEl ? costEl.value.trim() : '';
    // Resolve the variant image (protection: never lose an existing α/β
    // image unless the user explicitly cleared it):
    //   pending dataURL  → new upload (handled in saveFromForm)
    //   '__CLEARED__'    → user explicitly removed it → null
    //   null (untouched) → keep the existing stored image as-is
    const pend = state.pendingVariantImages ? state.pendingVariantImages[tier] : null;
    const exImg = (ex && ex.image != null && String(ex.image).trim() !== '')
      ? String(ex.image).trim() : null;
    let imageVal;
    if (pend === '__CLEARED__') imageVal = null;
    else if (pend) imageVal = pend; // dataURL, uploaded later
    else imageVal = exImg; // untouched → preserve existing
    if (traits) {
      // Cost: the form field is authoritative. Empty → null (no cost).
      // A present value (including 0) is parsed and always applied, so
      // edits to a variant that already had a cost take effect on save.
      let nextCost = null;
      if (costRaw !== '') {
        const n = Number(costRaw);
        nextCost = Number.isFinite(n) ? n : null;
      }
      // Spread the existing variant first so per-variant overrides
      // (elementType / barrierLimit / partsMode, etc.) survive a base-card
      // edit, then apply the form-editable fields on top.
      out.push(Object.assign({}, ex || {}, {
        tier: tier,
        label: (ex && ex.label) ? ex.label : '強化',
        traits: traits,
        actionCost: nextCost,
        image: imageVal,
      }));
    } else if (ex) {
      // Traits field emptied but the variant existed → keep the whole
      // variant (save-protection). imageVal preserves the existing image
      // unless the user explicitly cleared it.
      out.push(Object.assign({}, ex, { image: imageVal }));
    }
  });
  // Preserve any variants that the editor form does not manage
  // (e.g. drive_a / drive_b). The form only edits alpha/beta, so without
  // this, saving a card would silently drop its メダチェンジ variants.
  const FORM_TIERS = { alpha: 1, beta: 1 };
  for (const ev of existingVariants) {
    if (ev && ev.tier && !FORM_TIERS[ev.tier]) out.push(ev);
  }
  return out;
}

function enqueueFiles(files) {
  // Filter to images only
  const imgs = files.filter(function(f) { return f.type.startsWith('image/'); });
  if (imgs.length === 0) { toast('画像ファイルが含まれていません', 'error'); return; }
  // First file processes immediately, rest go to queue
  state.uploadQueue = state.uploadQueue.concat(imgs.slice(1));
  updateQueueBadge();
  if (imgs.length > 1) {
    toast(imgs.length + ' 件をキューに追加(現在 ' + (state.uploadQueue.length + 1) + ' 件)', 'info', 2400);
  }
  handleImageFile(imgs[0]);
}

async function processNextInQueue() {
  if (state.uploadQueue.length === 0) {
    updateQueueBadge();
    return false;
  }
  const next = state.uploadQueue.shift();
  updateQueueBadge();
  // Open fresh editor and load next image
  openEditor(null);
  await new Promise(function(r) { setTimeout(r, 100); });
  await handleImageFile(next);
  return true;
}

async function rotateImage90CW() {
  if (!state.pendingOrigImage) return;
  const btn = document.getElementById('rotateBtn');
  btn.disabled = true;
  try {
    const img = await loadImage(state.pendingOrigImage);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalHeight;
    canvas.height = img.naturalWidth;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(Math.PI / 2);
    ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
    state.pendingOrigImage = canvas.toDataURL('image/jpeg', 0.95);
    document.getElementById('origPreview').src = state.pendingOrigImage;

    setCropStatus('回転後、再検出中...', 'success');
    const bounds = await detectCardBounds(state.pendingOrigImage);
    state.pendingDetectedBounds = bounds;
    if (bounds.detected) {
      setCropStatus('枠を検出 — ' + Math.round((1 - bounds.ratio) * 100) + '% トリミング', 'success');
    } else if (bounds.almostFull) {
      setCropStatus('画像は既にトリミング済みです', 'original');
    } else {
      setCropStatus('枠を検出できませんでした → オリジナルを使用', 'fail');
    }
    await refreshCroppedPreview();
  } catch (e) {
    toast('回転処理に失敗: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

    } else if (bounds.almostFull) {
      setCropStatus('画像は既にトリミング済みです', 'original');
    } else {
      setCropStatus('枠を検出できませんでした → オリジナルを使用', 'fail');
