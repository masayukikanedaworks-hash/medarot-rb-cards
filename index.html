async function saveFromForm() {
  const name = getField('f_name').trim();
  if (!name) { showStatus('カード名を入力してください', 'error'); return; }
  const now = Date.now();
  const existing = state.editingId ? state.cards.find(c => c.id === state.editingId) : null;
  const cardId = state.editingId || genId();

  // 画像処理: dataURLなら新規アップロード、既にURLなら既存パスを保持
  let imagePath = existing ? existing.imagePath : null;
  let imageUrl = state.pendingImage;
  const isNewImage = state.pendingImage && state.pendingImage.startsWith('data:');
  if (isNewImage && SUPABASE_ENABLED) {
    try {
      showStatus('画像をアップロード中...', 'info');
      // 既存画像があれば削除
      if (existing && existing.imagePath) {
        await deleteCardImage(existing.imagePath);
      }
      imagePath = await uploadCardImage(cardId, state.pendingImage);
      imageUrl = publicImageUrl(imagePath);
    } catch (e) {
      showStatus('画像アップロード失敗: ' + e.message, 'error');
      return;
    }
  } else if (!state.pendingImage && existing && existing.imagePath) {
    // 画像が削除された
    await deleteCardImage(existing.imagePath);
    imagePath = null;
    imageUrl = null;
  }

  const card = {
    id: cardId,
    cardType: getField('f_cardType'),
    name: name,
    elementType: getField('f_elementType') || null,
    actionCost: getNumField('f_actionCost'),
    bp: getNumField('f_bp'),
    coolingCost: getNumField('f_coolingCost'),
    legType: getField('f_legType').trim() || null,
    partsArm: getField('f_partsArm') || null,
    partsMode: getField('f_partsMode') || null,
    bonusValue: getNumField('f_bonusValue'),
    barrierLimit: getNumField('f_barrierLimit'),
    variants: collectVariantsFromForm(existing),
    traits: getField('f_traits').trim() || null,
    effectText: getField('f_effectText').trim() || null,
    notes: getField('f_notes').trim() || null,
    image: imageUrl,
    imagePath: imagePath,
    createdAt: existing ? existing.createdAt : now,
    updatedAt: now,
  };
  try {
    // Upload any α/β variant images that are still raw dataURLs
    if (Array.isArray(card.variants) && card.variants.length && SUPABASE_ENABLED) {
      for (const v of card.variants) {
        if (v && typeof v.image === 'string' && v.image.startsWith('data:')) {
          try {
            const vp = await uploadCardImage(cardId + '-' + v.tier, v.image);
            if (vp) v.image = publicImageUrl(vp);
          } catch (ve) {
            toast((v.tier === 'alpha' ? 'α' : 'β') + '画像アップロード失敗: ' + ve.message, 'error');
          }
        }
      }
    }
    await persistCard(card);
    const idx = state.cards.findIndex(x => x.id === card.id);
    if (idx >= 0) state.cards[idx] = card; else state.cards.push(card);
    const wasUpdate = !!existing;
    const hasMore = state.uploadQueue.length > 0;
    closeEditor(true);
    renderAll();
    toast(wasUpdate ? 'カードを更新しました' : 'カードを保存しました', 'success');
    if (hasMore) {
      setTimeout(processNextInQueue, 250);
    }
  } catch (e) {
    showStatus('保存失敗: ' + e.message, 'error');
  }
}
async function deleteCurrent() {
  if (!state.editingId) return;
  if (!confirm('このカードを削除しますか?\n(操作は元に戻せません)')) return;
  try {
    await deleteCardFromStorage(state.editingId);
    state.cards = state.cards.filter(c => c.id !== state.editingId);
    closeEditor();
    renderAll();
    toast('カードを削除しました', 'success');
  } catch (e) {
    showStatus('削除失敗: ' + e.message, 'error');
  }
}
function duplicateCard(card) {
  openEditor(null);
  setField('f_cardType', card.cardType);
  setField('f_name', (card.name || '') + ' (コピー)');
  setField('f_elementType', card.elementType || '');
  setField('f_actionCost', card.actionCost != null ? card.actionCost : '');
  setField('f_bp', card.bp != null ? card.bp : '');
  setField('f_coolingCost', card.coolingCost != null ? card.coolingCost : '');
  setField('f_legType', card.legType || '');
  setField('f_partsArm', card.partsArm || '');
  setField('f_partsMode', card.partsMode || '');
  setField('f_bonusValue', card.bonusValue != null ? card.bonusValue : '');
  setField('f_barrierLimit', card.barrierLimit != null ? card.barrierLimit : '');
  setField('f_traits', card.traits || '');
  setField('f_effectText', card.effectText || '');
  setField('f_notes', card.notes || '');
  toggleFieldsForCardType(card.cardType);
  if (card.image) {
    state.pendingImage = card.image;
    document.getElementById('previewRow').style.display = 'grid';
    document.getElementById('origPreview').src = card.image;
    document.getElementById('trimPreview').src = card.image;
    document.getElementById('imageActions').style.display = 'flex';
  }
  document.getElementById('uploadTitle').textContent = 'NEW CARD (DUPLICATE)';
}

function exportJson() {
  if (state.cards.length === 0) { toast('エクスポートするカードがありません', 'error'); return; }
  const payload = {
    app: 'medarot-rb-cardbase',
    schemaVersion: SCHEMA_VERSION,
    exportedAt: new Date().toISOString(),
    count: state.cards.length,
    cards: state.cards,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ymd = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  a.download = 'medarot-rb-cards-' + ymd + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast(state.cards.length + ' 件をエクスポートしました', 'success');
}
function openImportModal() {
  document.getElementById('importModal').classList.add('open');
  document.getElementById('importFile').value = '';
}
function closeImportModal() { document.getElementById('importModal').classList.remove('open'); }

async function importJsonFile(file) {
  if (!file) return;
  const modeRadio = document.querySelector('input[name="importMode"]:checked');
  const mode = modeRadio ? modeRadio.value : 'merge';
  try {
    const text = await file.text();
    let data;
    try { data = JSON.parse(text); }
    catch (e) { toast('JSON 解析失敗: ' + e.message, 'error'); return; }
    const cards = Array.isArray(data && data.cards) ? data.cards
                : Array.isArray(data) ? data : null;
    if (!cards) { toast('不正な形式: cards 配列が見つかりません', 'error'); return; }

    if (mode === 'replace') {
      if (!confirm('現在の ' + state.cards.length + ' 件のカードをすべて削除して、\n' + cards.length + ' 件で置き換えますか?')) return;
      for (const c of state.cards) await deleteCardFromStorage(c.id);
      state.cards = [];
    }
    let added = 0, updated = 0, skipped = 0, failed = 0;
    const failedNames = [];
    let firstError = null;
    const existingIds = new Set(state.cards.map(c => c.id));
    for (const raw of cards) {
      if (!raw || typeof raw !== 'object' || !raw.name) { skipped++; continue; }
      const id = raw.id || genId();
      const exists = existingIds.has(id);
      if (exists && mode === 'merge') { skipped++; continue; }
      const existing = exists ? state.cards.find(c => c.id === id) : null;
      // For upsert mode: preserve existing image if new card lacks one,
      // and preserve original createdAt.
      const card = {
        id: id,
        cardType: CARD_CATEGORIES[raw.cardType] ? raw.cardType : 'leader_medarot',
        name: String(raw.name),
        elementType: ELEMENT_TYPES.indexOf(raw.elementType) >= 0 ? raw.elementType : null,
        actionCost: typeof raw.actionCost === 'number' ? raw.actionCost : null,
        bp: typeof raw.bp === 'number' ? raw.bp : null,
        coolingCost: typeof raw.coolingCost === 'number' ? raw.coolingCost : null,
        legType: raw.legType || null,
        partsArm: (raw.partsArm === 'L' || raw.partsArm === 'R') ? raw.partsArm : null,
        partsMode: (raw.partsMode === '行動' || raw.partsMode === '戦術') ? raw.partsMode : null,
        bonusValue: typeof raw.bonusValue === 'number' ? raw.bonusValue : null,
        barrierLimit: typeof raw.barrierLimit === 'number' ? raw.barrierLimit : null,
        variants: Array.isArray(raw.variants) ? raw.variants.filter(v => v && typeof v === 'object' && v.tier).map(v => {
          // Preserve a previously-uploaded α/β image when the imported
          // payload omits it (image:null). Mirrors the base-image guard
          // below so re-importing a text-only JSON never wipes variant art.
          const exVar = (existing && Array.isArray(existing.variants))
            ? existing.variants.find(ev => ev && ev.tier === String(v.tier))
            : null;
          const ov = {
            tier: String(v.tier),
            label: v.label != null ? String(v.label) : null,
            traits: v.traits != null ? String(v.traits) : null,
            actionCost: typeof v.actionCost === 'number' ? v.actionCost : null,
            image: (v.image != null && v.image !== '') ? String(v.image)
                  : (exVar && exVar.image) ? exVar.image : null,
          };
          // Optional per-variant overrides (only attach when valid; absent = inherit base)
          if (ELEMENT_TYPES.indexOf(v.elementType) >= 0) ov.elementType = v.elementType;
          if (typeof v.barrierLimit === 'number') ov.barrierLimit = v.barrierLimit;
          if (typeof v.partsMode === 'string' && v.partsMode) ov.partsMode = v.partsMode;
          if (typeof v.bonusValue === 'number') ov.bonusValue = v.bonusValue;
          return ov;
        }) : [],
        traits: raw.traits || null,
        effectText: raw.effectText || null,
        notes: raw.notes || null,
        // Preserve existing image when upserting if the new payload has none
        image: raw.image || (existing ? existing.image : null) || null,
        // Preserve image_path on upsert. cardToDb writes image_path from
        // card.imagePath, so omitting it here would blank the stored image.
        imagePath: raw.imagePath || (existing ? existing.imagePath : null) || null,
        createdAt: (existing && existing.createdAt) || raw.createdAt || Date.now(),
        updatedAt: Date.now(),
      };
      try {
        await persistCard(card);
        const idx = state.cards.findIndex(c => c.id === card.id);
        if (idx >= 0) { state.cards[idx] = card; updated++; }
        else { state.cards.push(card); added++; existingIds.add(card.id); }
      } catch (err) {
        failed++;
        failedNames.push(card.name);
        if (!firstError) firstError = err && err.message ? err.message : String(err);
        console.error('Import failed:', card.name, err);
      }
    }
    renderAll();
    closeImportModal();
    if (failed > 0) {
      const detail = firstError ? '\n[エラー: ' + firstError.slice(0, 300) + ']' : '';
      toast('追加 ' + added + ' / 更新 ' + updated + ' / スキップ ' + skipped + ' / 失敗 ' + failed + detail, 'error', 10000);
    } else {
      toast('追加 ' + added + ' / 更新 ' + updated + ' / スキップ ' + skipped, 'success');
    }
  } catch (e) {
    toast('インポート失敗: ' + e.message, 'error');
  }
}

function wire() {
  document.getElementById('fabAdd').addEventListener('click', function() { openEditor(null); });
  document.getElementById('exportBtn').addEventListener('click', exportJson);
  document.getElementById('importBtn').addEventListener('click', openImportModal);

  document.getElementById('search').addEventListener('input', function(e) { state.search = e.target.value; renderGrid(); });
  document.getElementById('bpMin').addEventListener('input', function(e) { state.bpMin = e.target.value; renderGrid(); });
  document.getElementById('bpMax').addEventListener('input', function(e) { state.bpMax = e.target.value; renderGrid(); });
  document.getElementById('costMin').addEventListener('input', function(e) { state.costMin = e.target.value; renderGrid(); });
  document.getElementById('costMax').addEventListener('input', function(e) { state.costMax = e.target.value; renderGrid(); });
  document.getElementById('legFilter').addEventListener('input', function(e) { state.legFilter = e.target.value; renderGrid(); });
  document.getElementById('partsArmFilter').addEventListener('change', function(e) { state.partsArmFilter = e.target.value; renderGrid(); });
  document.getElementById('partsModeFilter').addEventListener('change', function(e) { state.partsModeFilter = e.target.value; renderGrid(); });
  document.getElementById('sortSelect').addEventListener('change', function(e) { state.sortBy = e.target.value; renderGrid(); });
  document.getElementById('clearFilters').addEventListener('click', function() {
    state.search = ''; state.elementType = '';
    state.bpMin = ''; state.bpMax = ''; state.costMin = ''; state.costMax = '';
    state.legFilter = ''; state.partsArmFilter = ''; state.partsModeFilter = '';
    state.sortBy = 'updated-desc';
    document.getElementById('search').value = '';
    ['bpMin','bpMax','costMin','costMax','legFilter'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('partsArmFilter').value = '';
    document.getElementById('partsModeFilter').value = '';
    document.getElementById('sortSelect').value = 'updated-desc';
    renderAll();
    toast('フィルタをリセットしました', 'info', 1800);
  });

  document.getElementById('uploadClose').addEventListener('click', closeEditor);
  document.getElementById('cancelBtn').addEventListener('click', closeEditor);
  document.getElementById('saveBtn').addEventListener('click', saveFromForm);
  document.getElementById('deleteBtn').addEventListener('click', deleteCurrent);
  document.getElementById('duplicateBtn').addEventListener('click', function() {
    const c = state.cards.find(function(x) { return x.id === state.editingId; });
    if (c) { closeEditor(); duplicateCard(c); }
  });
  document.getElementById('f_cardType').addEventListener('change', function(e) { toggleFieldsForCardType(e.target.value); });
  document.getElementById('removeImageBtn').addEventListener('click', removePendingImage);

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', function(e) {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    enqueueFiles(files);
    e.target.value = '';
  });
  ['dragenter','dragover'].forEach(function(ev) {
    dropzone.addEventListener(ev, function(e) { e.preventDefault(); dropzone.classList.add('dragover'); });
  });
  ['dragleave','dragend','drop'].forEach(function(ev) {
    dropzone.addEventListener(ev, function(e) { e.preventDefault(); dropzone.classList.remove('dragover'); });
  });
  dropzone.addEventListener('drop', function(e) {
    const files = Array.from(e.dataTransfer.files || []).filter(function(f) { return f.type.startsWith('image/'); });
    if (files.length === 0) return;
    enqueueFiles(files);
  });

  ['alpha', 'beta'].forEach(function(tier) {
    const dz = document.getElementById('var_' + tier + '_dropzone');
    const fi = document.getElementById('f_var_' + tier + '_imgfile');
    const clr = document.getElementById('var_' + tier + '_clear');
    if (fi) {
      fi.addEventListener('change', function(e) {
        const f = (e.target.files || [])[0];
        if (f) handleVariantImageFile(tier, f);
        e.target.value = '';
      });
    }
    if (dz) {
      ['dragenter','dragover'].forEach(function(ev) {
        dz.addEventListener(ev, function(e) { e.preventDefault(); dz.classList.add('dragover'); });
      });
      ['dragleave','dragend','drop'].forEach(function(ev) {
        dz.addEventListener(ev, function(e) { e.preventDefault(); dz.classList.remove('dragover'); });
      });
      dz.addEventListener('drop', function(e) {
        const f = Array.from(e.dataTransfer.files || []).filter(function(x) { return x.type.startsWith('image/'); })[0];
        if (f) handleVariantImageFile(tier, f);
      });
    }
    if (clr) clr.addEventListener('click', function() { clearVariantImage(tier); });
  });

  document.getElementById('useOriginalToggle').addEventListener('change', async function(e) {
    state.useOriginal = e.target.checked;
    if (state.pendingOrigImage) {
      if (state.useOriginal) {
        setCropStatus('オリジナルを使用中', 'original');
      } else if (state.pendingDetectedBounds && state.pendingDetectedBounds.detected) {
        const r = state.pendingDetectedBounds.ratio;
        setCropStatus('枠を検出 — ' + Math.round((1 - r) * 100) + '% トリミング', 'success');
      } else if (state.pendingDetectedBounds && state.pendingDetectedBounds.almostFull) {
        setCropStatus('画像は既にトリミング済みです', 'original');
      } else {
        setCropStatus('枠を検出できませんでした → オリジナルを使用', 'fail');
      }
      await refreshCroppedPreview();
    }
  });

  document.getElementById('rotateBtn').addEventListener('click', rotateImage90CW);

  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('lightbox').addEventListener('click', closeLightbox);
  document.getElementById('lightboxClose').addEventListener('click', function(e) { e.stopPropagation(); closeLightbox(); });

  document.getElementById('importClose').addEventListener('click', closeImportModal);
  document.querySelectorAll('.import-radio').forEach(function(r) {
    r.addEventListener('click', function() {
      document.querySelectorAll('.import-radio').forEach(function(x) { x.classList.remove('selected'); });
      r.classList.add('selected');
      const radio = r.querySelector('input[type=radio]');
      if (radio) radio.checked = true;
    });
  });
  const importDrop = document.getElementById('importDrop');
  const importFile = document.getElementById('importFile');
  importFile.addEventListener('change', function(e) {
    const f = e.target.files && e.target.files[0];
    if (f) importJsonFile(f);
  });
  ['dragenter','dragover'].forEach(function(ev) {
    importDrop.addEventListener(ev, function(e) { e.preventDefault(); importDrop.classList.add('dragover'); });
  });
  ['dragleave','dragend','drop'].forEach(function(ev) {
    importDrop.addEventListener(ev, function(e) { e.preventDefault(); importDrop.classList.remove('dragover'); });
  });
  importDrop.addEventListener('drop', function(e) {
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) importJsonFile(f);
  });

  document.getElementById('uploadModal').addEventListener('click', function(e) {
    if (e.target.id === 'uploadModal') closeEditor();
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeDetail();
  });
  document.getElementById('importModal').addEventListener('click', function(e) {
    if (e.target.id === 'importModal') closeImportModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (document.getElementById('lightbox').classList.contains('open')) return closeLightbox();
      if (document.getElementById('uploadModal').classList.contains('open')) return closeEditor();
      if (document.getElementById('detailModal').classList.contains('open')) return closeDetail();
      if (document.getElementById('importModal').classList.contains('open')) return closeImportModal();
    }
    const tag = document.activeElement && document.activeElement.tagName;
    const inField = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    const inModal = !!document.querySelector('.modal-overlay.open');
    if (e.key === '/' && !inField && !inModal) {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if ((e.key === 'n' || e.key === 'N') && !inField && !inModal) {
      e.preventDefault();
      openEditor(null);
    }
  });
}

async function init() {
  wire();
  renderAll();
  // 接続状態インジケータ更新 + 疎通テスト
  const indicator = document.getElementById('cloudIndicator');
  if (!SUPABASE_ENABLED) {
    if (indicator) {
      indicator.classList.add('offline');
      indicator.title = 'Supabase 未接続';
    }
    state.loading = false;
    renderAll();
    return;
  }
  // Supabase疎通テスト
  try {
    const testUrl = SUPABASE_URL + '/rest/v1/cards?select=id&limit=1';
    const resp = await fetch(testUrl, { headers: supaHeaders() });
    if (!resp.ok) {
      const txt = await resp.text().catch(() => '');
      throw new Error('HTTP ' + resp.status + ': ' + txt.slice(0, 200));
    }
    if (indicator) indicator.title = 'Supabase 接続中';
  } catch (e) {
    if (indicator) {
      indicator.classList.add('offline');
      indicator.title = '接続失敗: ' + e.message;
    }
    toast('Supabase接続失敗: ' + e.message, 'error', 8000);
    state.loading = false;
    renderAll();
    return;
  }
  // 既存カードをSupabaseから取得
  try {
    const cards = await loadAllCards();
    state.cards = cards;
    state.loading = false;
    renderAll();
  } catch (e) {
    state.loading = false;
    renderAll();
    toast('カード読み込み失敗: ' + e.message, 'error', 5000);
  }
}
init();
</script>
